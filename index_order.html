        {[...ctx.orders].sort((a,b) => new Date(a.deliveryDate) - new Date(b.deliveryDate)).map(o => (

// ─── PRODUCTS MANAGEMENT ────────────────────────────────────────────────────────
function ProductsManagement({ ctx }) {
  const [modal, setModal] = useState(null); // null | 'new' | product
  const [form, setForm] = useState({});

  const openNew = () => {
    setForm({ name: "", nameHi: "", categoryId: "", price: "", minQty: 1, maxQty: "", departments: [], stockDependent: false, active: true });
    setModal("new");
  };
  const openEdit = (p) => { setForm({ ...p }); setModal(p); };

  const save = async () => {
    if (!form.name || !form.categoryId || form.price === "") return;
    const p = {
      ...form, id: form.id || uid(),
      price: Number(form.price), minQty: Number(form.minQty) || 1, maxQty: Number(form.maxQty) || 9999,
      saleActive: !!form.saleActive,
      saleType: form.saleType || "percent",
      saleValue: Number(form.saleValue) || 0,
      saleFrom: form.saleFrom || "",
      saleTo: form.saleTo || "",
    };
    const existing = ctx.products.findIndex(x => x.id === p.id);
    const updated = existing >= 0 ? ctx.products.map(x => x.id === p.id ? p : x) : [...ctx.products, p];
    await ctx.saveProducts(updated);
    setModal(null);
    ctx.showToast(existing >= 0 ? "מוצר עודכן" : "מוצר נוסף");
  };

  const toggleDept = (d) => {
    const deps = form.departments || [];
    setForm({ ...form, departments: deps.includes(d) ? deps.filter(x => x !== d) : [...deps, d] });
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h3 style={{ fontSize: 16, fontWeight: 700 }}>מוצרים ({ctx.products.length})</h3>
        <Btn size="sm" onClick={openNew}>+ מוצר חדש</Btn>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {ctx.products.map(p => {
          const cat = ctx.categories.find(c => c.id === p.categoryId);
          return (
            <Card key={p.id} onClick={() => openEdit(p)} style={{ cursor: "pointer", opacity: p.active ? 1 : 0.5 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 700 }}>{p.name}</div>
                  <div style={{ fontSize: 13, color: C.textMuted }}>
                    {cat?.name} | ₪{fmt(p.price)}
                    {p.saleActive && <span style={{ marginRight: 6, background: "#F59E0B", color: "#fff", borderRadius: 4, padding: "1px 7px", fontSize: 11, fontWeight: 700 }}>🏷️ מבצע</span>}
                  </div>
                  <div style={{ display: "flex", gap: 4, marginTop: 4, flexWrap: "wrap" }}>
                    {p.departments?.map(d => <Badge key={d} color={C.dept[d]}>{d}</Badge>)}
                  </div>
                </div>
                {!p.active && <Badge color={C.danger}>לא פעיל</Badge>}
              </div>
            </Card>
          );
        })}
      </div>

      {modal && (
        <Modal title={modal === "new" ? "מוצר חדש" : `עריכה: ${form.name}`} onClose={() => setModal(null)} width={500}>
          <Input label="שם המוצר" value={form.name || ""} onChange={v => setForm({ ...form, name: v })} required />
          <Input label="שם בהינדי (אופציונלי)" value={form.nameHi || ""} onChange={v => setForm({ ...form, nameHi: v })} />
          <Select label="קטגוריה" value={form.categoryId || ""} onChange={v => setForm({ ...form, categoryId: v })} required
            options={[{ value: "", label: "בחר קטגוריה..." }, ...ctx.categories.map(c => ({ value: c.id, label: c.name }))]} />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
            <Input label="מחיר ₪" value={form.price} onChange={v => setForm({ ...form, price: v })} type="number" required />
            <Input label="מינימום" value={form.minQty} onChange={v => setForm({ ...form, minQty: v })} type="number" />
            <Input label="מקסימום" value={form.maxQty} onChange={v => setForm({ ...form, maxQty: v })} type="number" />
          </div>

          {/* מבצע */}
          <div style={{ background: form.saleActive ? "#FFF8E1" : C.bg, border: `1.5px solid ${form.saleActive ? "#F59E0B" : C.border}`, borderRadius: 10, padding: "12px 14px", marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: form.saleActive ? 12 : 0 }}>
              <input type="checkbox" id="saleActive" checked={!!form.saleActive} onChange={e => setForm({ ...form, saleActive: e.target.checked })} style={{ width: 18, height: 18, cursor: "pointer" }} />
              <label htmlFor="saleActive" style={{ fontSize: 14, fontWeight: 700, cursor: "pointer", color: form.saleActive ? "#92400E" : C.text }}>
                🏷️ מוצר במבצע
              </label>
              {form.saleActive && form.saleValue > 0 && (
                <span style={{ marginRight: "auto", background: "#F59E0B", color: "#fff", borderRadius: 6, padding: "2px 10px", fontSize: 13, fontWeight: 700 }}>
                  {form.saleType === "percent" ? `-${form.saleValue}%` : `₪${Number(form.price) - form.saleValue}`}
                </span>
              )}
            </div>
            {form.saleActive && (
              <div>
                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                  {[["percent","% הנחה"],["fixed","מחיר קבוע"]].map(([v,l]) => (
                    <button key={v} onClick={() => setForm({ ...form, saleType: v })}
                      style={{ flex: 1, padding: "7px 0", border: `1.5px solid ${form.saleType === v ? "#F59E0B" : C.border}`, borderRadius: 8, background: form.saleType === v ? "#FFF8E1" : C.surface, fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "Heebo, sans-serif", color: form.saleType === v ? "#92400E" : C.textMuted }}>
                      {l}
                    </button>
                  ))}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8 }}>
                  <div>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: C.textMuted, marginBottom: 3 }}>
                      {form.saleType === "percent" ? "אחוז הנחה" : "מחיר מבצע ₪"}
                    </label>
                    <input type="number" value={form.saleValue || ""} onChange={e => setForm({ ...form, saleValue: e.target.value })}
                      placeholder={form.saleType === "percent" ? "10" : "9.90"}
                      style={{ width: "100%", padding: "8px 10px", border: `1.5px solid ${C.border}`, borderRadius: 8, fontSize: 14, fontFamily: "Heebo, sans-serif" }} />
                    {form.saleType === "percent" && form.saleValue > 0 && form.price > 0 && (
                      <div style={{ fontSize: 11, color: "#92400E", marginTop: 3 }}>מחיר אחרי הנחה: ₪{(Number(form.price) * (1 - form.saleValue/100)).toFixed(2)}</div>
                    )}
                  </div>
                  <div>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: C.textMuted, marginBottom: 3 }}>מתאריך</label>
                    <input type="date" value={form.saleFrom || ""} onChange={e => setForm({ ...form, saleFrom: e.target.value })}
                      style={{ width: "100%", padding: "7px 8px", border: `1.5px solid ${C.border}`, borderRadius: 8, fontSize: 13 }} />
                  </div>
                  <div>
                    <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: C.textMuted, marginBottom: 3 }}>עד תאריך</label>
                    <input type="date" value={form.saleTo || ""} onChange={e => setForm({ ...form, saleTo: e.target.value })}
                      style={{ width: "100%", padding: "7px 8px", border: `1.5px solid ${C.border}`, borderRadius: 8, fontSize: 13 }} />
                  </div>
                </div>
              </div>
            )}
          </div>

          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.textMuted, marginBottom: 8 }}>מחלקות רלוונטיות</label>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {DEPARTMENTS.map(d => (
                <button key={d} onClick={() => toggleDept(d)} style={{
                  padding: "6px 14px", borderRadius: 20, border: `1.5px solid ${(form.departments || []).includes(d) ? C.dept[d] : C.border}`,
                  background: (form.departments || []).includes(d) ? C.dept[d] : C.surface,
                  color: (form.departments || []).includes(d) ? "#fff" : C.text, cursor: "pointer", fontWeight: 600, fontSize: 13
                }}>{d}</button>
              ))}
            </div>
          </div>

          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
            <input type="checkbox" checked={form.active} onChange={e => setForm({ ...form, active: e.target.checked })} id="active" />
            <label htmlFor="active" style={{ fontSize: 14, fontWeight: 600 }}>מוצר פעיל</label>
          </div>

          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="ghost" onClick={() => setModal(null)} style={{ flex: 1 }}>ביטול</Btn>
            <Btn onClick={save} style={{ flex: 2 }}>שמור</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── CATEGORIES MANAGEMENT ──────────────────────────────────────────────────────
function CategoriesManagement({ ctx }) {
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ name: "", nameHi: "", order: 1 });

  const save = async () => {
    if (!form.name) return;
    const cat = { ...form, id: form.id || uid() };
    const existing = ctx.categories.findIndex(c => c.id === cat.id);
    const updated = existing >= 0 ? ctx.categories.map(c => c.id === cat.id ? cat : c) : [...ctx.categories, cat];
    await ctx.saveCategories(updated);
    setModal(null);
    ctx.showToast("קטגוריה נשמרה");
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h3 style={{ fontSize: 16, fontWeight: 700 }}>קטגוריות ({ctx.categories.length})</h3>
        <Btn size="sm" onClick={() => { setForm({ name: "", nameHi: "", order: ctx.categories.length + 1 }); setModal("new"); }}>+ קטגוריה</Btn>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {[...ctx.categories].sort((a, b) => a.order - b.order).map(cat => {
          const count = ctx.products.filter(p => p.categoryId === cat.id).length;
          return (
            <Card key={cat.id} onClick={() => { setForm({ ...cat }); setModal(cat); }} style={{ cursor: "pointer" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 700 }}>{cat.name}</div>
                  {cat.nameHi && <div style={{ fontSize: 13, color: C.textMuted }}>{cat.nameHi}</div>}
                </div>
                <Badge color={C.primary}>{count} מוצרים</Badge>
              </div>
            </Card>
          );
        })}
      </div>

      {modal && (
        <Modal title={modal === "new" ? "קטגוריה חדשה" : `עריכה: ${form.name}`} onClose={() => setModal(null)} width={380}>
          <Input label="שם קטגוריה" value={form.name} onChange={v => setForm({ ...form, name: v })} required />
          <Input label="שם בהינדי" value={form.nameHi || ""} onChange={v => setForm({ ...form, nameHi: v })} />
          <Input label="סדר תצוגה" value={form.order} onChange={v => setForm({ ...form, order: Number(v) })} type="number" />
          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="ghost" onClick={() => setModal(null)} style={{ flex: 1 }}>ביטול</Btn>
            <Btn onClick={save} style={{ flex: 2 }}>שמור</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── CUSTOMERS MANAGEMENT ────────────────────────────────────────────────────────
function CustomersManagement({ ctx }) {
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({});

  const save = async () => {
    if (!form.name || !form.phone) return;
    const c = { ...form, id: form.id || uid(), createdAt: form.createdAt || new Date().toISOString() };
    const existing = ctx.customers.findIndex(x => x.id === c.id);
    const updated = existing >= 0 ? ctx.customers.map(x => x.id === c.id ? c : x) : [...ctx.customers, c];
    await ctx.saveCustomers(updated);
    setModal(null);
    ctx.showToast("לקוח נשמר");
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h3 style={{ fontSize: 16, fontWeight: 700 }}>לקוחות ({ctx.customers.length})</h3>
        <Btn size="sm" onClick={() => { setForm({ name: "", phone: "", type: "private", routeId: "", active: true }); setModal("new"); }}>+ לקוח חדש</Btn>
      </div>
      {ctx.customers.length === 0 && <p style={{ color: C.textMuted, textAlign: "center", padding: 32 }}>אין לקוחות רשומים</p>}
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        {ctx.customers.map(c => (
          <Card key={c.id} onClick={() => { setForm({ ...c }); setModal(c); }} style={{ cursor: "pointer" }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontWeight: 700 }}>{c.name}</div>
                <div style={{ fontSize: 13, color: C.textMuted }}>{c.phone}</div>
              </div>
              <Badge color={c.type === "business" ? C.primary : C.accent}>{c.type === "business" ? "עסקי" : "פרטי"}</Badge>
            </div>
          </Card>
        ))}
      </div>

      {modal && (
        <Modal title={modal === "new" ? "לקוח חדש" : `עריכה: ${form.name}`} onClose={() => setModal(null)} width={420}>
          <Input label="שם מלא" value={form.name || ""} onChange={v => setForm({ ...form, name: v })} required />
          <Input label="טלפון" value={form.phone || ""} onChange={v => setForm({ ...form, phone: v })} type="tel" required />
          <Select label="סוג לקוח" value={form.type || "private"} onChange={v => setForm({ ...form, type: v })}
            options={[{ value: "private", label: "פרטי" }, { value: "business", label: "עסקי" }]} />
          {form.type === "business" && (
            <Select label="קו חלוקה" value={form.routeId || ""} onChange={v => setForm({ ...form, routeId: v })}
              options={[{ value: "", label: "ללא קו חלוקה" }, ...ctx.routes.map(r => ({ value: r.id, label: r.name }))]} />
          )}
          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="ghost" onClick={() => setModal(null)} style={{ flex: 1 }}>ביטול</Btn>
            <Btn onClick={save} style={{ flex: 2 }}>שמור</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}


  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
</body>
</html>
