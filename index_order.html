  <!-- Storage shim: window.storage using localStorage -->
  <script>
  window.storage = {
    get: async (key, shared) => {
      try {
        const val = localStorage.getItem((shared?'s:':'p:') + key);
        return val !== null ? { key, value: val, shared: !!shared } : null;
      } catch(e) { return null; }
    },
    set: async (key, value, shared) => {
      try {
        localStorage.setItem((shared?'s:':'p:') + key, value);
        return { key, value, shared: !!shared };
      } catch(e) { return null; }
    },
    delete: async (key, shared) => {
      try {
        localStorage.removeItem((shared?'s:':'p:') + key);
        return { key, deleted: true, shared: !!shared };
      } catch(e) { return null; }
    },
    list: async (prefix, shared) => {
      try {
        const pfx = (shared?'s:':'p:') + (prefix||'');
        const keys = Object.keys(localStorage).filter(k=>k.startsWith(pfx)).map(k=>k.slice(shared?2:2));
        return { keys, prefix, shared: !!shared };
      } catch(e) { return { keys:[] }; }
    }
  };
  </script>

async function load(key) {
  try {
    const r = await window.storage.get(key, true);
    return r ? JSON.parse(r.value) : null;
  } catch { return null; }
}
async function save(key, val) {
  try { await window.storage.set(key, JSON.stringify(val), true); } catch {}
}

const uid = () => Math.random().toString(36).slice(2, 10);
const fmt = (n) => {
  const r = Math.round(n * 10) / 10;
  return r % 1 === 0 ? r.toString() : r.toFixed(1);
};
const fmtDate = (d) => {
  if (!d) return "";
  const dt = new Date(d);
  return dt.toLocaleDateString("he-IL", { weekday: "short", day: "numeric", month: "numeric" });
};
const today = () => new Date().toISOString().slice(0, 10);
const tomorrow = () => {
  const d = new Date(); d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
};

const GS = `
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }

  button { font-family: 'Heebo', sans-serif; }
`;

// ─── REUSABLE COMPONENTS ───────────────────────────────────────────────────────
const Btn = ({ children, onClick, variant = "primary", size = "md", disabled, style }) => {
  const base = {
    border: "none", cursor: disabled ? "not-allowed" : "pointer", borderRadius: 10,
    fontFamily: "Heebo, sans-serif", fontWeight: 700, transition: "all 0.15s",
    opacity: disabled ? 0.45 : 1,
    padding: size === "sm" ? "6px 14px" : size === "lg" ? "14px 28px" : "10px 20px",
    fontSize: size === "sm" ? 13 : size === "lg" ? 15 : 14,
    ...style,
  };
  const variants = {
    primary: { background: C.primary, color: "#fff", boxShadow: "0 2px 8px rgba(26,35,50,0.18)" },
    secondary: { background: C.surface, color: C.primary, border: `1.5px solid ${C.border}` },
    accent: { background: C.gold, color: "#fff", boxShadow: "0 2px 8px rgba(184,150,90,0.35)" },
    danger: { background: C.danger, color: "#fff" },
    ghost: { background: "transparent", color: C.textMuted, border: `1px solid ${C.border}` },
  };
  return <button style={{ ...base, ...variants[variant] }} onClick={onClick} disabled={disabled}>{children}</button>;
};

const Input = ({ label, value, onChange, placeholder, type = "text", required, style }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <label style={{ display: "block", fontSize: 12, fontWeight: 600, color: C.textMuted, marginBottom: 5, letterSpacing: 0.3 }}>{label}{required && <span style={{ color: C.danger }}> *</span>}</label>}
    <input
      type={type} value={value} onChange={e => onChange(e.target.value)}
      placeholder={placeholder}
      style={{ width: "100%", padding: "11px 14px", border: `1.5px solid ${C.border}`, borderRadius: 10, fontSize: 14, background: C.surface, color: C.text, outline: "none", boxShadow: "0 1px 3px rgba(0,0,0,0.05)", ...style }}
    />
  </div>
);

const Select = ({ label, value, onChange, options, required }) => (
  <div style={{ marginBottom: 14 }}>
    {label && <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.textMuted, marginBottom: 4 }}>{label}{required && <span style={{ color: C.danger }}> *</span>}</label>}
    <select value={value} onChange={e => onChange(e.target.value)}
      style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${C.border}`, borderRadius: 8, fontSize: 14, background: C.surface, color: C.text, outline: "none" }}>
      {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
  </div>
);

const Badge = ({ children, color = C.primary, bg }) => (
  <span style={{ display: "inline-block", padding: "3px 10px", borderRadius: 20, fontSize: 11, fontWeight: 700, letterSpacing: 0.2, background: bg || color + "18", color }}>{children}</span>

function LoginScreen({ ctx }) {
  // If newOrderMode: skip straight to customer type selection
  const [mode, setMode] = useState(ctx.newOrderMode ? "select" : null);
  const [name, setName] = useState("");
  const [phone, setPhone] = useState("");
  const [pin, setPin] = useState("");
  const [pinError, setPinError] = useState(false);
  const [found, setFound] = useState(null);

  const searchCustomer = (val) => {
    if (val.length < 2) { setFound(null); return; }
    const f = ctx.customers.find(c => c.name.includes(val) || c.phone.includes(val));
    setFound(f || null);
  };

  const handleLogin = () => {
    if (mode === "manager") {
      if (pin === "2412") {
        ctx.setUser({ type: "manager", name: "לישי טויזר" });
        ctx.setScreen("manager");
      } else setPinError(true);
      return;
    }
    if (!name.trim() || !phone.trim()) return;
    let customer = ctx.customers.find(c => c.phone === phone.trim());

      customer = { id: uid(), name: name.trim(), phone: phone.trim(), type: mode, routeId: null, priceListId: null, createdAt: new Date().toISOString() };
      ctx.saveCustomers([...ctx.customers, customer]);

              <div style={{ textAlign: "right" }}>
                <div style={{ color: "#F0D5B0", fontWeight: 700, fontSize: 16 }}>מוניטור הזמנות</div>
                <div style={{ color: "#ffffff66", fontSize: 13 }}>צפייה וניהול כל ההזמנות</div>
              </div>
            </button>
          )}

          {/* Back button when in new order mode */}
          {ctx.newOrderMode && (
            <button onClick={() => { ctx.setNewOrderMode(false); ctx.setScreen("monitor"); }}
              style={{ width: "100%", marginTop: 10, background: "rgba(255,255,255,0.1)", border: "1px solid rgba(255,255,255,0.2)", borderRadius: 12, padding: "10px 0", color: "#ffffffaa", fontSize: 14, cursor: "pointer", fontFamily: "Heebo, sans-serif" }}>
              ← ביטול
            </button>
          )}
        </div>
      ) : (
        <div style={{ background: C.surface, borderRadius: 16, padding: 28, width: "100%", maxWidth: 380 }}>
          <button onClick={() => { setMode(null); setPin(""); setPinError(false); }} style={{ background: "none", border: "none", cursor: "pointer", color: C.textMuted, fontSize: 13, marginBottom: 16, display: "flex", alignItems: "center", gap: 4, fontFamily: "Heebo, sans-serif" }}>
            ← חזרה
          </button>

          {mode === "manager" ? (
            <>
              <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 20 }}>כניסת מנהל</h2>
              <Input label="קוד PIN" value={pin} onChange={v => { setPin(v); setPinError(false); }} type="password" placeholder="הכנס PIN" />
              {pinError && <p style={{ color: C.danger, fontSize: 13, marginTop: -8, marginBottom: 12 }}>קוד שגוי</p>}
              <Btn onClick={handleLogin} size="lg" style={{ width: "100%" }}>כניסה</Btn>
            </>
          ) : (
            <>
              <h2 style={{ fontSize: 18, fontWeight: 700, marginBottom: 20 }}>
                {mode === "private" ? "👤 לקוח פרטי" : "🏪 לקוח עסקי"}
              </h2>
              <Input label="שם מלא" value={name} onChange={v => { setName(v); searchCustomer(v); }} placeholder="ישראל ישראלי" required />
              {found && (
                <div onClick={() => { setName(found.name); setPhone(found.phone); }} style={{ background: C.successLight, border: `1px solid ${C.success}`, borderRadius: 8, padding: "10px 14px", marginTop: -8, marginBottom: 12, cursor: "pointer", fontSize: 13 }}>
                  ✓ מצאנו אותך: <strong>{found.name}</strong> – {found.phone}. לחץ לאישור
                </div>
              )}
              <Input label="טלפון" value={phone} onChange={setPhone} placeholder="050-0000000" type="tel" required />
              <Btn onClick={handleLogin} size="lg" style={{ width: "100%" }} disabled={!name.trim() || !phone.trim()}>המשך להזמנה</Btn>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ─── ORDER SCREEN ───────────────────────────────────────────────────────────────
function OrderScreen({ ctx }) {
  const [step, setStep] = useState(1); // 1=date+pickup, 2=products, 3=confirm
  const [deliveryDate, setDeliveryDate] = useState(tomorrow());
  const [deliveryTime, setDeliveryTime] = useState("08:00");
  const [pickupType, setPickupType] = useState("pickup"); // pickup | delivery
  const [routeId, setRouteId] = useState("");
  const [note, setNote] = useState("");
  const [cart, setCart] = useState([]); // [{productId, qty, note}]
  const [search, setSearch] = useState("");
  const [selectedCat, setSelectedCat] = useState(null);
  const [addingProduct, setAddingProduct] = useState(null);
  const [itemQty, setItemQty] = useState(1);
  const [itemNote, setItemNote] = useState("");
  const [noteConfirmed, setNoteConfirmed] = useState(false);
  const [showNoteConfirm, setShowNoteConfirm] = useState(false);
  const [paymentMethod, setPaymentMethod] = useState("");
  const [showExitConfirm, setShowExitConfirm] = useState(false);
  const [pendingNewOrder, setPendingNewOrder] = useState(false);

  const customer = ctx.customers.find(c => c.id === ctx.user?.customerId);

  // Auto-assign route for business customers
  useEffect(() => {
    if (ctx.user?.type === "business" && customer?.routeId) setRouteId(customer.routeId);
  }, [customer]);

  const activeCategories = ctx.categories.filter(c =>
    ctx.products.some(p => p.categoryId === c.id && p.active)
  ).sort((a, b) => a.order - b.order);

  const filteredProducts = ctx.products.filter(p => {
    if (!p.active) return false;
    if (search) return p.name.includes(search) || p.nameHi?.includes(search);
    return selectedCat ? p.categoryId === selectedCat : false;
  });

  const addToCart = () => {
    if (!addingProduct) return;
    const existing = cart.findIndex(c => c.productId === addingProduct.id);
    if (existing >= 0) {
      const newCart = [...cart];
      newCart[existing] = { ...newCart[existing], qty: newCart[existing].qty + itemQty, note: itemNote || newCart[existing].note };
      setCart(newCart);
    } else {
      setCart([...cart, { productId: addingProduct.id, qty: itemQty, note: itemNote }]);
    }
    setAddingProduct(null); setItemQty(1); setItemNote("");
  };

  const removeFromCart = (productId) => setCart(cart.filter(c => c.productId !== productId));

  const submitOrder = async () => {
    const order = {
      id: uid(),
      customerId: ctx.user?.customerId || null,
      customerName: ctx.user?.name,
      customerPhone: ctx.user?.phone,
      customerType: ctx.user?.type,
      deliveryDate,
      deliveryTime,
      pickupType,
      paymentMethod,
      routeId: pickupType === "delivery" ? routeId : (customer?.routeId || null),
      note,
      items: cart,
      status: "pending",
      deptStatus: Object.fromEntries(DEPARTMENTS.map(d => [d, "pending"])),
      createdAt: new Date().toISOString(),
      editableUntil: new Date(Date.now() + 30 * 60 * 1000).toISOString(), // 30 min
    };
    await ctx.saveOrders([...ctx.orders, order]);
    ctx.showToast("ההזמנה נשלחה בהצלחה! 🎉");
    ctx.setScreen("login");
  };

  const cartTotal = cart.reduce((sum, item) => {
    const p = ctx.products.find(p => p.id === item.productId);
    return sum + (p ? p.price * item.qty : 0);
  }, 0);

  return (
    <div style={{ minHeight: "100vh", width: "100%", background: C.bg, display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{ background: "#222222", padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}><img src={LOGO_SRC} alt="" style={{ height:28, width:"auto" }} /><h2 style={{ color: C.gold, fontSize: 16, fontWeight: 800 }}>הזמנה חדשה</h2></div>
          <p style={{ color: "#ffffff88", fontSize: 13 }}>שלום, {ctx.user?.name}</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          {cart.length > 0 && (
            <div style={{ background: C.accent, borderRadius: 20, padding: "4px 12px", color: "#fff", fontSize: 13, fontWeight: 700 }}>
              🛒 {cart.length} פריטים
            </div>
          )}
          <button onClick={() => { if (cart.length > 0) setShowExitConfirm(true); else ctx.setScreen("login"); }} style={{ background: "none", border: "none", color: "#ffffff88", cursor: "pointer", fontSize: 22 }}>✕</button>
        </div>
      </div>

      {/* Step indicator */}
      <div style={{ display: "flex", background: C.surface, borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
        {[{ n: 1, label: "פרטים" }, { n: 2, label: "מוצרים" }, { n: 3, label: "אישור" }].map(s => (
          <div key={s.n} style={{ flex: 1, padding: "12px 0", textAlign: "center", fontSize: 13, fontWeight: 600,
            color: step === s.n ? "#B8965A" : C.textMuted, borderBottom: step === s.n ? `3px solid #B8965A` : "3px solid transparent" }}>
            {s.n}. {s.label}
          </div>
        ))}
      </div>

      {/* STEP 2 – full height split panel */}
      {step === 2 && (
        <div style={{ display: "flex", flexDirection: "column", flex: 1, overflow: "hidden", width: "100%" }}>
          {/* Search */}
          <div style={{ padding: "10px 14px", background: C.surface, borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
            <div style={{ position: "relative" }}>
              <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)" }}>🔍</span>
              <input value={search} onChange={e => { setSearch(e.target.value); if (e.target.value) setSelectedCat(null); }}
                placeholder="חיפוש מוצר..."
                style={{ width: "100%", padding: "9px 36px 9px 32px", border: `1.5px solid ${C.border}`, borderRadius: 10, fontSize: 14, fontFamily: "Heebo, sans-serif", direction: "rtl" }} />
              {search && <button onClick={() => setSearch("")} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", border: "none", background: "none", cursor: "pointer", color: C.textMuted, fontSize: 18 }}>✕</button>}
            </div>
          </div>

          {/* Split: categories | products */}
          <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
            {/* Categories column – selected is larger */}
            <div style={{ width: 100, borderLeft: `1px solid ${C.border}`, overflowY: "auto", background: C.bg, flexShrink: 0 }}>
              {activeCategories.map(cat => {
                const isActive = selectedCat === cat.id;
                return (
                  <button key={cat.id} onClick={() => { setSelectedCat(cat.id); setSearch(""); }}
                    style={{
                      width: "100%",
                      padding: isActive ? "16px 8px" : "11px 6px",
                      border: "none",
                      borderBottom: `1px solid ${C.border}`,
                      borderRight: isActive ? `3px solid ${C.primary}` : "3px solid transparent",
                      background: isActive ? C.primary+"15" : "transparent",
                      color: isActive ? C.primary : C.textMuted,
                      fontWeight: isActive ? 800 : 400,
                      fontSize: isActive ? 14 : 12,
                      cursor: "pointer", textAlign: "center",
                      fontFamily: "Heebo, sans-serif", lineHeight: 1.3,
                      transition: "all 0.15s"
                    }}>
                    {cat.name}
                  </button>
                );
              })}
            </div>

            {/* Products column – vertical scroll */}
            <div style={{ flex: 1, overflowY: "auto", padding: 10, display: "flex", flexDirection: "column", gap: 8 }}>
              {!selectedCat && !search && (
                <div style={{ textAlign: "center", padding: 40, color: C.textMuted }}>
                  <div style={{ fontSize: 32, marginBottom: 10 }}>👈</div>
                  <p style={{ fontSize: 14 }}>בחר קטגוריה<br/>או חפש מוצר</p>
                </div>
              )}
              {(selectedCat || search) && filteredProducts.length === 0 && (
                <p style={{ textAlign: "center", color: C.textMuted, padding: 24, fontSize: 14 }}>לא נמצאו מוצרים</p>
              )}
              {filteredProducts.map(p => {
                const inCart = cart.find(c => c.productId === p.id);
                return (
                  <div key={p.id} style={{ background: C.surface, borderRadius: 10, border: `1.5px solid ${inCart ? C.primary : C.border}`, padding: "10px 12px", display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{p.name}</div>
                      {p.nameHi && <div style={{ color: C.textMuted, fontSize: 11 }}>{p.nameHi}</div>}
                      {p.saleActive && p.saleValue > 0 ? (
                        <div style={{ marginTop: 3 }}>
                          <span style={{ color: C.textMuted, fontSize: 11, textDecoration: "line-through" }}>₪{fmt(p.price)}</span>
                          <span style={{ color: C.danger, fontWeight: 800, fontSize: 14, marginRight: 4 }}>
                            ₪{p.saleType === "percent" ? (p.price * (1 - p.saleValue/100)).toFixed(2) : p.saleValue}
                          </span>
                          <span style={{ background: "#F59E0B", color: "#fff", borderRadius: 4, padding: "1px 6px", fontSize: 10, fontWeight: 700 }}>מבצע</span>
                        </div>
                      ) : (
                        <div style={{ color: C.accent, fontWeight: 700, fontSize: 13, marginTop: 3 }}>₪{fmt(p.price)}</div>
                      )}
                    </div>
                    {inCart ? (
                      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
                          <div style={{ background: C.primary, color: "#fff", borderRadius: 8, padding: "4px 12px", fontSize: 15, fontWeight: 800 }}>{inCart.qty} יח׳</div>
                          <div style={{ fontSize: 11, color: C.accent, fontWeight: 700, marginTop: 2 }}>₪{fmt(inCart.qty * p.price)}</div>
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                          <button onClick={() => { setAddingProduct(p); setItemQty(inCart.qty); setItemNote(inCart.note||""); }}
                            style={{ border: `1px solid ${C.primary}`, background: "transparent", color: C.primary, borderRadius: 6, padding: "3px 8px", cursor: "pointer", fontSize: 11, fontFamily: "Heebo, sans-serif", fontWeight: 700 }}>עדכן</button>
                          <button onClick={() => removeFromCart(p.id)}
                            style={{ border: "none", background: C.dangerLight, color: C.danger, borderRadius: 6, padding: "3px 8px", cursor: "pointer", fontSize: 11, fontFamily: "Heebo, sans-serif" }}>הסר</button>
                        </div>
                      </div>
                    ) : (
                      <button onClick={() => { setAddingProduct(p); setItemQty(p.minQty || 1); setItemNote(""); }}
                        style={{ background: C.primary, border: "none", borderRadius: 8, color: "#fff", padding: "8px 14px", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "Heebo, sans-serif", flexShrink: 0 }}>
                        + הוסף
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Fixed bottom bar */}
          <div style={{ background: C.surface, borderTop: `1px solid ${C.border}`, padding: "12px 16px", flexShrink: 0, boxShadow: "0 -4px 16px rgba(0,0,0,0.07)" }}>
            {cart.length > 0 ? (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>🛒 {cart.length} פריטים בסל</span>
                  <span style={{ fontWeight: 800, color: C.accent, fontSize: 15 }}>₪{fmt(cartTotal)}</span>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn variant="ghost" onClick={() => setStep(1)} style={{ flex: 1 }}>← חזרה</Btn>
                  <Btn onClick={() => setStep(3)} style={{ flex: 2 }}>המשך לאישור →</Btn>
                </div>
              </>
            ) : (
              <div style={{ display: "flex", gap: 8 }}>
                <Btn variant="ghost" onClick={() => setStep(1)} style={{ flex: 1 }}>← חזרה</Btn>
                <div style={{ flex: 2, display: "flex", alignItems: "center", justifyContent: "center", color: C.textMuted, fontSize: 13 }}>בחר לפחות מוצר אחד</div>
              </div>
            )}
          </div>
        </div>
      )}

      <div style={{ padding: 20, width: "100%", display: step === 2 ? "none" : "block" }}>

        {/* STEP 1 – Date & pickup */}
        {step === 1 && (
          <div>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 2 }}>
                <Input label="תאריך אספקה" value={deliveryDate} onChange={setDeliveryDate} type="date" required />
              </div>
              <div style={{ flex: 1 }}>
                <Input label="שעה" value={deliveryTime} onChange={setDeliveryTime} type="time" required />
              </div>
            </div>
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.textMuted, marginBottom: 8 }}>אופן קבלה *</label>
              <div style={{ display: "flex", gap: 10 }}>
                {[{ v: "pickup", label: "🏪 איסוף עצמי" }, { v: "delivery", label: "🚚 שילוח" }].map(opt => (
                  <button key={opt.v} onClick={() => setPickupType(opt.v)} style={{
                    flex: 1, padding: "12px 0", border: `2px solid ${pickupType === opt.v ? C.primary : C.border}`,
                    borderRadius: 10, background: pickupType === opt.v ? C.primary + "11" : C.surface,
                    color: pickupType === opt.v ? C.primary : C.textMuted, fontWeight: 600, cursor: "pointer", fontSize: 14
                  }}>{opt.label}</button>
                ))}
              </div>
            </div>
            {pickupType === "delivery" && (
              <Select label="קו חלוקה" value={routeId} onChange={setRouteId}
                options={[{ value: "", label: "בחר קו..." }, ...ctx.routes.map(r => ({ value: r.id, label: r.name + " – " + r.area }))]} />
            )}
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.textMuted, marginBottom: 4 }}>הערה כללית להזמנה</label>
              <textarea value={note} onChange={e => setNote(e.target.value)} placeholder="הערות כלליות..."
                style={{ width: "100%", padding: "10px 12px", border: `1.5px solid ${C.border}`, borderRadius: 8, fontSize: 14, minHeight: 80, resize: "vertical", fontFamily: "Heebo, sans-serif" }} />
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <Btn variant="ghost" onClick={() => { if (cart.length > 0) setShowExitConfirm(true); else ctx.setScreen("login"); }} style={{ flex: 1 }}>← חזרה</Btn>
              <Btn onClick={() => setStep(2)} size="lg" style={{ flex: 2 }} disabled={!deliveryDate || (pickupType === "delivery" && !routeId)}>המשך →</Btn>
            </div>
          </div>
        )}

        {/* STEP 2 – Products */}
        {step === 2 && (
          <div>
            {/* Search */}
            <div style={{ position: "relative", marginBottom: 16 }}>
              <input value={search} onChange={e => { setSearch(e.target.value); setSelectedCat(null); }}
                placeholder="🔍 חיפוש מוצר..."
                style={{ width: "100%", padding: "10px 40px 10px 12px", border: `1.5px solid ${C.border}`, borderRadius: 10, fontSize: 14 }} />
              {search && <button onClick={() => setSearch("")} style={{ position: "absolute", left: 10, top: "50%", transform: "translateY(-50%)", border: "none", background: "none", cursor: "pointer", color: C.textMuted }}>✕</button>}
            </div>

            {/* Categories */}
            {!search && (
              <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 8, marginBottom: 16 }}>
                {activeCategories.map(cat => (
                  <button key={cat.id} onClick={() => setSelectedCat(selectedCat === cat.id ? null : cat.id)}
                    style={{ flex: "none", padding: "8px 16px", borderRadius: 20, border: `1.5px solid ${selectedCat === cat.id ? C.primary : C.border}`,
                      background: selectedCat === cat.id ? C.primary : C.surface,
                      color: selectedCat === cat.id ? "#fff" : C.text, fontWeight: 600, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>
                    {cat.name}
                  </button>
                ))}
              </div>
            )}

            {/* Products list */}
            {(search || selectedCat) && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {filteredProducts.length === 0 && <p style={{ textAlign: "center", color: C.textMuted, padding: 24 }}>לא נמצאו מוצרים</p>}
                {filteredProducts.map(p => {
                  const inCart = cart.find(c => c.productId === p.id);
                  return (
                    <Card key={p.id} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 15 }}>{p.name}</div>
                        <div style={{ color: C.textMuted, fontSize: 12 }}>{p.nameHi}</div>
                        <div style={{ color: C.accent, fontWeight: 700, fontSize: 14, marginTop: 2 }}>₪{fmt(p.price)}</div>
                      </div>
                      {inCart ? (
                        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                          <Badge color={C.primary}>{inCart.qty} יח'</Badge>
                          <button onClick={() => removeFromCart(p.id)} style={{ border: "none", background: C.dangerLight, color: C.danger, borderRadius: 6, padding: "4px 8px", cursor: "pointer", fontSize: 12 }}>הסר</button>
                        </div>
                      ) : (
                        <Btn size="sm" onClick={() => { setAddingProduct(p); setItemQty(p.minQty || 1); setItemNote(""); }}>+ הוסף</Btn>
                      )}
                    </Card>
                  );
                })}
              </div>
            )}

            {!search && !selectedCat && (
              <div style={{ textAlign: "center", padding: 40, color: C.textMuted }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>👆</div>
                <p>בחר קטגוריה או חפש מוצר</p>
              </div>
            )}

            {/* Cart summary */}
            {cart.length > 0 && (
              <div style={{ position: "sticky", bottom: 0, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 12, padding: 16, marginTop: 16, boxShadow: "0 -4px 20px rgba(0,0,0,0.08)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontWeight: 700 }}>סל הזמנה ({cart.length} פריטים)</span>
                  <span style={{ fontWeight: 700, color: C.accent }}>₪{fmt(cartTotal)}</span>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn variant="ghost" onClick={() => setStep(1)} style={{ flex: 1 }}>← חזרה</Btn>
                  <Btn onClick={() => setStep(3)} style={{ flex: 2 }}>המשך לאישור →</Btn>
                </div>
              </div>
            )}
          </div>
        )}

        {/* STEP 3 – Confirm */}
        {step === 3 && (
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <button onClick={() => setStep(2)} style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontFamily: "Heebo, sans-serif", fontSize: 14, color: C.textMuted }}>← חזרה</button>
              <h3 style={{ fontSize: 16, fontWeight: 700 }}>סיכום הזמנה</h3>
            </div>
            <Card style={{ marginBottom: 14 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, fontSize: 14 }}>
                <div><span style={{ color: C.textMuted }}>אספקה: </span><strong>{fmtDate(deliveryDate)} {deliveryTime}</strong></div>
                <div><strong>{pickupType === "pickup" ? "🏪 איסוף" : "🚚 שילוח"}</strong></div>
              </div>
              {note && (
                <div style={{ background: C.warningLight, borderRadius: 8, padding: "8px 12px", marginBottom: 10 }}>
                  <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 2 }}>📝 הערה כללית</div>
                  <div style={{ fontSize: 14 }}>{note}</div>
                </div>
              )}
              <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 10 }}>
                {cart.map(item => {
                  const p = ctx.products.find(p => p.id === item.productId);
                  return p ? (
                    <div key={item.productId} style={{ marginBottom: 5 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <span style={{ fontWeight: 600, fontSize: 14, flex: 1 }}>{p.name}</span>
                        <span style={{ fontSize: 13, color: C.textMuted, margin: "0 8px" }}>×{item.qty}</span>
                        <span style={{ fontWeight: 700, fontSize: 14, color: C.accent }}>₪{fmt(p.price * item.qty)}</span>
                      </div>
                      {item.note && <div style={{ fontSize: 12, color: C.warning, marginTop: 1, paddingRight: 4 }}>📝 {item.note}</div>}
                    </div>
                  ) : null;
                })}
                <div style={{ borderTop: `1px solid ${C.border}`, paddingTop: 8, marginTop: 6, display: "flex", justifyContent: "space-between", fontWeight: 700, fontSize: 16 }}>
                  <span>סה"כ</span><span style={{ color: C.accent }}>₪{fmt(cartTotal)}</span>
                </div>
              </div>
            </Card>

            {/* אופן תשלום */}
            <Card style={{ marginBottom: 14 }}>
              <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10 }}>💳 אופן תשלום</div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                {[
                  ["cash","💵 מזומן"],
                  ["credit","💳 אשראי"],
                  ["transfer","🏦 העברה בנקאית"],
                  ["delivery_note","📄 תעודת משלוח"],
                  ["bit","💜 ביט"],
                ].map(([val, label]) => (
                  <button key={val} onClick={() => setPaymentMethod(val)}
                    style={{ padding: "10px 8px", borderRadius: 10, border: `2px solid ${paymentMethod === val ? C.primary : C.border}`,
                      background: paymentMethod === val ? C.primary + "11" : C.surface,
                      color: paymentMethod === val ? C.primary : C.text,
                      fontWeight: paymentMethod === val ? 700 : 400, fontSize: 13,
                      cursor: "pointer", fontFamily: "Heebo, sans-serif", textAlign: "center" }}>
                    {label}
                  </button>
                ))}
              </div>
              {!paymentMethod && (
                <div style={{ color: C.danger, fontSize: 12, marginTop: 8 }}>* נדרש לבחור אופן תשלום</div>
              )}
            </Card>

            <div style={{ position: "sticky", bottom: 0, background: C.surface, borderTop: `1px solid ${C.border}`, padding: "12px 0 4px", marginTop: 8, display: "flex", gap: 10 }}>
              <Btn variant="ghost" onClick={() => setStep(2)} style={{ flex: 1 }}>← חזרה</Btn>
              <Btn onClick={submitOrder} style={{ flex: 2 }} disabled={!paymentMethod}>
                שלח הזמנה 🎉
              </Btn>
            </div>
          </div>
        )}
      </div>

      {/* Exit confirm modal */}
      {showExitConfirm && (
        <Modal title="יציאה מההזמנה" onClose={() => setShowExitConfirm(false)} width={320}>
          <p style={{ fontSize: 15, marginBottom: 20, color: C.text }}>יש לך {cart.length} פריטים בסל. אם תצא עכשיו ההזמנה לא תישמר.</p>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="ghost" onClick={() => setShowExitConfirm(false)} style={{ flex: 1 }}>המשך הזמנה</Btn>
            <Btn variant="danger" onClick={() => { setShowExitConfirm(false); ctx.setScreen("login"); }} style={{ flex: 1 }}>יציאה</Btn>
          </div>
        </Modal>
      )}

      {/* New order from mid-flow confirm */}
      {pendingNewOrder && (
        <Modal title="הזמנה חדשה" onClose={() => setPendingNewOrder(false)} width={320}>
          <p style={{ fontSize: 15, marginBottom: 20, color: C.text }}>יש לך הזמנה בתהליך עם {cart.length} פריטים. האם לבטל אותה ולפתוח הזמנה חדשה?</p>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="ghost" onClick={() => setPendingNewOrder(false)} style={{ flex: 1 }}>חזרה</Btn>
            <Btn variant="danger" onClick={() => { setPendingNewOrder(false); setCart([]); setStep(1); setNote(""); setPaymentMethod(""); setDeliveryDate(tomorrow()); setDeliveryTime("08:00"); }} style={{ flex: 1 }}>הזמנה חדשה</Btn>
          </div>
        </Modal>
      )}

      {/* Add product modal */}
      {addingProduct && (
        <Modal title={`הוסף: ${addingProduct.name}`} onClose={() => setAddingProduct(null)} width={340}>
          {/* Price per unit + total */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: C.bg, borderRadius: 10, padding: "10px 14px", marginBottom: 16 }}>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 2 }}>מחיר ליחידה</div>
              <div style={{ fontWeight: 700, fontSize: 16, color: C.textMuted }}>₪{addingProduct.price}</div>
            </div>
            <div style={{ fontSize: 20, color: C.border }}>×</div>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 2 }}>כמות</div>
              <div style={{ fontWeight: 800, fontSize: 20, color: C.primary }}>{itemQty}</div>
            </div>
            <div style={{ fontSize: 20, color: C.border }}>=</div>
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 2 }}>סה"כ</div>
              <div style={{ fontWeight: 800, fontSize: 20, color: C.accent }}>₪{fmt(addingProduct.price * itemQty)}</div>
            </div>
          </div>

          {/* Qty controls */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
            <button onClick={() => setItemQty(Math.max(addingProduct.minQty || 1, itemQty - 1))}
              style={{ width: 56, height: 56, border: `2px solid ${C.border}`, borderRadius: 12, fontSize: 32, cursor: "pointer", background: C.surface, fontWeight: 700, flexShrink: 0, lineHeight: 1 }}>−</button>
            <input
              type="number"
              value={itemQty}
              onChange={e => {
                const v = parseInt(e.target.value) || 1;
                setItemQty(Math.min(addingProduct.maxQty || 9999, Math.max(addingProduct.minQty || 1, v)));
              }}
              style={{ width: 64, textAlign: "center", fontSize: 24, fontWeight: 800, border: `2px solid ${C.primary}`, borderRadius: 10, padding: "10px 0", fontFamily: "Heebo, sans-serif", color: C.text, background: C.surface }}
            />
            <button onClick={() => setItemQty(Math.min(addingProduct.maxQty || 9999, itemQty + 1))}
              style={{ width: 56, height: 56, border: `2px solid ${C.border}`, borderRadius: 12, fontSize: 32, cursor: "pointer", background: C.surface, fontWeight: 700, flexShrink: 0, lineHeight: 1 }}>+</button>
          </div>
          <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 14, textAlign: "center" }}>מינ׳: {addingProduct.minQty || 1} | מקס׳: {addingProduct.maxQty || "ללא"}</div>

          {/* Note */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: 13, fontWeight: 600, color: C.textMuted, marginBottom: 4 }}>הערה למוצר זה (אופציונלי)</label>
            <textarea value={itemNote} onChange={e => setItemNote(e.target.value)} placeholder="הערה ספציפית לפריט זה..."
              style={{ width: "100%", padding: "8px 12px", border: `1.5px solid ${C.border}`, borderRadius: 8, fontSize: 14, minHeight: 52, resize: "none", fontFamily: "Heebo, sans-serif" }} />
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="ghost" onClick={() => setAddingProduct(null)} style={{ flex: 1 }}>ביטול</Btn>
            <Btn onClick={addToCart} style={{ flex: 2 }}>הוסף לסל</Btn>
          </div>
        </Modal>
      )}
    </div>
  );
}
