// ─── MONITOR PRODUCT SUMMARY ────────────────────────────────────────────────────
function MonitorProductSummary({ ctx }) {
  const [open, setOpen] = useState(false);
  const [expandedProd, setExpandedProd] = useState(null);

  // Sum all active orders
  const summary = {};
  ctx.orders.filter(o => ["confirmed","in_progress","ready"].includes(o.status)).forEach(order => {
    (order.items||[]).forEach(item => {
      const p = ctx.products.find(p => p.id === item.productId);
      if (!p) return;
      if (!summary[item.productId]) summary[item.productId] = { product: p, total: 0, entries: [] };
      summary[item.productId].total += item.qty;
      summary[item.productId].entries.push({ order, qty: item.qty, note: item.note });
    });
  });
  const items = Object.values(summary).sort((a,b) => b.total - a.total);
  if (items.length === 0) return null;

  return (
    <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
      <button onClick={() => setOpen(!open)}
        style={{ width: "100%", padding: "9px 16px", background: "none", border: "none", cursor: "pointer", fontFamily: "Heebo, sans-serif", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontWeight: 700, fontSize: 14, color: open ? C.primary : C.text }}>📊 סיכום מוצרים לביצוע</span>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          {items.slice(0,3).map(({product,total}) => (
            <span key={product.id} style={{ background: C.primary+"18", color: C.primary, borderRadius: 6, padding: "2px 8px", fontSize: 12, fontWeight: 700 }}>
              {product.name.split(" ")[0]}: {total}
            </span>
          ))}
          <span style={{ color: C.textMuted, fontSize: 14 }}>{open ? "▲" : "▼"}</span>
        </div>
      </button>
      {open && (
        <div style={{ padding: "0 12px 12px" }}>
          {items.map(({ product, total, entries }) => (
            <div key={product.id} style={{ marginBottom: 8, borderRadius: 10, overflow: "hidden", border: `1px solid ${C.border}` }}>
              <button onClick={() => setExpandedProd(expandedProd === product.id ? null : product.id)}
                style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 14px", background: C.bg, border: "none", cursor: "pointer", fontFamily: "Heebo, sans-serif" }}>
                <span style={{ fontWeight: 700, fontSize: 14 }}>{product.name}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ fontWeight: 900, fontSize: 22, color: C.primary }}>{total}</span>
                  <span style={{ fontSize: 11, color: C.textMuted }}>יח׳</span>
                  <span style={{ color: C.textMuted }}>{expandedProd === product.id ? "▲" : "▼"}</span>
                </div>
              </button>
              {expandedProd === product.id && (
                <div style={{ background: C.surface }}>
                  {entries.map((e, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", padding: "8px 14px", borderTop: `1px solid ${C.border}` }}>
                      <div>
                        <div style={{ fontWeight: 600, fontSize: 13 }}>{e.order.customerName}</div>
                        <div style={{ fontSize: 12, color: C.textMuted }}>{fmtDate(e.order.deliveryDate)} {e.order.deliveryTime||""}</div>
                        {e.note && <div style={{ fontSize: 12, color: C.warning }}>📌 {e.note}</div>}
                      </div>
                      <span style={{ fontWeight: 800, fontSize: 16, color: C.primary }}>{e.qty}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ROUTE SCREEN ────────────────────────────────────────────────────────────────
function RouteScreen({ ctx, onClose }) {
  const [selectedRoute, setSelectedRoute] = useState(null);
  const [activeTab, setActiveTab] = useState("summary"); // summary | orders
  const [expandedProduct, setExpandedProduct] = useState(null);
  const [pickingOrder, setPickingOrder] = useState(null);
  const [filterDate, setFilterDate] = useState('all'); // default: show all

  // Orders on this route: either routeId matches, OR customer is assigned to this route
  const routeOrders = selectedRoute
    ? ctx.orders.filter(o => {
        const customer = ctx.customers.find(c => c.id === o.customerId);
        const onRoute = o.routeId === selectedRoute.id || customer?.routeId === selectedRoute.id;
        const activeStatus = ["pending","confirmed","in_progress","ready","delivered"].includes(o.status);
        const dateMatch = filterDate === "all" || o.deliveryDate === filterDate;
        return onRoute && activeStatus && dateMatch;
      }).sort((a,b) => new Date(a.deliveryDate+"T"+(a.deliveryTime||"00:00")) - new Date(b.deliveryDate+"T"+(b.deliveryTime||"00:00")))
    : [];

  // Product summary across route orders
  const routeSummary = {};
  routeOrders.forEach(order => {
    (order.items||[]).forEach(item => {
      const p = ctx.products.find(p => p.id === item.productId);
      if (!p) return;
      if (!routeSummary[item.productId]) routeSummary[item.productId] = { product: p, total: 0, customers: [] };
      routeSummary[item.productId].total += item.qty;
      routeSummary[item.productId].customers.push({ order, qty: item.qty, note: item.note });
    });
  });

  // Picking state: {orderId: {productId: collected}}
  const [collected, setCollected] = useState({});
  const [completionModal, setCompletionModal] = useState(null); // order that just completed
  const [docType, setDocType] = useState(null); // "invoice"|"delivery_note"|"none"
  const toggleCollect = (orderId, productId) => {
    setCollected(prev => {
      const next = { ...prev, [orderId]: { ...(prev[orderId]||{}), [productId]: !prev[orderId]?.[productId] } };
      // Check if ALL items of this order are now collected
      const order = ctx.orders.find(o => o.id === orderId);
      if (order && (order.items||[]).length > 0 && (order.items||[]).every(i => next[orderId]?.[i.productId])) {
        // Trigger completion flow after state update
        setTimeout(() => setCompletionModal(order), 50);
      }
      return next;
    });
  };

  const completeOrderPickup = async (order, doc) => {
    // Cascade: mark ALL departments as ready
    const updated = ctx.orders.map(o => {
      if (o.id !== order.id) return o;
      const ds = {};
      DEPARTMENTS.forEach(d => { ds[d] = "ready"; });
      return { ...o, deptStatus: ds, status: "delivered", deliveryDoc: doc };
    });
    await ctx.saveOrders(updated);
    setCompletionModal(null);
    setDocType(null);
    ctx.showToast("✅ הזמנה הושלמה – כל המחלקות עודכנו");
  };
  const isCollected = (orderId, productId) => !!collected[orderId]?.[productId];
  const orderCollectedCount = (order) => (order.items||[]).filter(i => collected[order.id]?.[i.productId]).length;
  const isOrderDone = (order) => (order.items||[]).length > 0 && (order.items||[]).every(i => collected[order.id]?.[i.productId]);

  // Route list screen
  if (!selectedRoute) {
    return (
      <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:600, display:"flex", flexDirection:"column" }}>
        <div style={{ background:C.primary, padding:"14px 16px", display:"flex", alignItems:"center", gap:12 }}>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:8, padding:"6px 12px", color:"#fff", fontWeight:700, cursor:"pointer", fontFamily:"Heebo, sans-serif", fontSize:14 }}>← חזרה</button>
          <h2 style={{ color:C.gold, fontWeight:800, fontSize:17 }}>🚚 קווי חלוקה</h2>
        </div>
        <div style={{ flex:1, overflowY:"auto", padding:16 }}>
          {ctx.routes.map(route => {
            const count = ctx.orders.filter(o => {
              const cust = ctx.customers.find(c => c.id === o.customerId);
              return (o.routeId === route.id || cust?.routeId === route.id) && ["confirmed","in_progress","ready"].includes(o.status);
            }).length;
            const todayCount = ctx.orders.filter(o => {
              const cust = ctx.customers.find(c => c.id === o.customerId);
              return (o.routeId === route.id || cust?.routeId === route.id) && o.deliveryDate === today() && ["confirmed","in_progress","ready"].includes(o.status);
            }).length;
            return (
              <div key={route.id} onClick={() => setSelectedRoute(route)}
                style={{ background:C.surface, border:`2px solid ${count>0?C.gold:C.border}`, borderRadius:14, padding:16, marginBottom:12, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", boxShadow:"0 2px 8px rgba(0,0,0,0.06)" }}>
                <div>
                  <div style={{ fontWeight:800, fontSize:16 }}>{route.name}</div>
                  <div style={{ fontSize:13, color:C.textMuted, marginTop:2 }}>{route.area}</div>
                  {todayCount > 0 && <div style={{ fontSize:12, color:C.gold, fontWeight:700, marginTop:3 }}>היום: {todayCount} הזמנות</div>}
                </div>
                <div style={{ textAlign:"center" }}>
                  <div style={{ fontSize:26, fontWeight:900, color:count>0?C.gold:C.textMuted }}>{count}</div>
                  <div style={{ fontSize:11, color:C.textMuted }}>סה"כ פעיל</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return (
    <div style={{ position:"fixed", inset:0, background:C.bg, zIndex:600, display:"flex", flexDirection:"column" }}>
      {/* Header */}
      <div style={{ background:C.primary, padding:"12px 16px", flexShrink:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
          <button onClick={() => setSelectedRoute(null)} style={{ background:"rgba(255,255,255,0.15)", border:"none", borderRadius:8, padding:"5px 10px", color:"#fff", fontWeight:700, cursor:"pointer", fontFamily:"Heebo, sans-serif", fontSize:13 }}>← קווים</button>
          <h2 style={{ color:C.gold, fontWeight:800, fontSize:16 }}>🚚 {selectedRoute.name}</h2>
          <div style={{ marginRight:"auto", background:C.gold, borderRadius:8, padding:"3px 10px", color:C.primary, fontWeight:800, fontSize:13 }}>{routeOrders.length} הזמנות</div>
        </div>
        {/* Date filter */}
        <div style={{ display:"flex", gap:6, marginBottom:8 }}>
          {[["היום", today()], ["מחר", (() => { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); })()], ["הכל","all"]].map(([label,val]) => (
            <button key={val} onClick={() => setFilterDate(val)}
              style={{ padding:"4px 12px", borderRadius:8, border:`1.5px solid ${filterDate===val?C.gold:"rgba(255,255,255,0.2)"}`, background:filterDate===val?C.gold:"transparent", color:filterDate===val?C.primary:"#fff", fontWeight:700, fontSize:12, cursor:"pointer", fontFamily:"Heebo, sans-serif" }}>
              {label}
            </button>
          ))}
        </div>
        {/* Product chips */}
        <div style={{ display:"flex", gap:5, overflowX:"auto" }}>
          {Object.values(routeSummary).map(({product,total}) => (
            <div key={product.id} style={{ flex:"none", background:"rgba(184,150,90,0.2)", border:"1px solid rgba(184,150,90,0.4)", borderRadius:8, padding:"3px 10px", color:C.gold, fontSize:12, fontWeight:700 }}>
              {product.name.split(" ")[0]}: {total}
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", background:C.surface, borderBottom:`1px solid ${C.border}`, flexShrink:0 }}>
        {[["summary","📊 סיכום מוצרים"],["orders","📋 לפי הזמנות"]].map(([v,l]) => (
          <button key={v} onClick={() => setActiveTab(v)}
            style={{ flex:1, padding:"11px 0", border:"none", background:"none", fontWeight:700, fontSize:14, cursor:"pointer", fontFamily:"Heebo, sans-serif", color:activeTab===v?C.gold:C.textMuted, borderBottom:activeTab===v?`3px solid ${C.gold}`:"3px solid transparent" }}>
            {l}
          </button>
        ))}
      </div>

      {/* ── SUMMARY TAB ── */}
      {activeTab === "summary" && (
        <div style={{ flex:1, overflowY:"auto", padding:12 }}>
          {Object.values(routeSummary).length === 0 && (
            <div style={{ textAlign:"center", padding:40, color:C.textMuted }}>
              <div style={{ fontSize:32, marginBottom:8 }}>📭</div>
              <p>אין הזמנות בקו זה{filterDate!=='all'?' ב'+filterDate:''}</p>
            </div>
          )}
          {Object.values(routeSummary).map(({ product, total, customers }) => {
            const isExp = expandedProduct === product.id;
            // Count how many collected for this product
            const collectedCount = customers.filter(c => isCollected(c.order.id, product.id)).length;
            return (
              <div key={product.id} style={{ marginBottom:10, borderRadius:12, overflow:"hidden", border:`1.5px solid ${collectedCount===customers.length && customers.length>0 ? C.success : C.border}`, background:C.surface }}>
                {/* Product header */}
                <button onClick={() => setExpandedProduct(isExp ? null : product.id)}
                  style={{ width:"100%", display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", background:collectedCount===customers.length&&customers.length>0?C.successLight:"transparent", border:"none", cursor:"pointer", fontFamily:"Heebo, sans-serif" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ textAlign:"right" }}>
                      <div style={{ fontWeight:800, fontSize:15, color:C.text }}>{product.name}</div>
                      <div style={{ fontSize:12, color:C.textMuted }}>{customers.length} לקוחות</div>
                    </div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    {collectedCount > 0 && <span style={{ fontSize:12, color:C.success, fontWeight:700 }}>{collectedCount}/{customers.length} נאסף</span>}
                    <span style={{ fontWeight:900, fontSize:26, color:collectedCount===customers.length&&customers.length>0?C.success:C.gold }}>{total}</span>
                    <span style={{ color:C.textMuted }}>{isExp?"▲":"▼"}</span>
                  </div>
                </button>
                {/* Customer breakdown */}
                {isExp && (
                  <div style={{ borderTop:`1px solid ${C.border}` }}>
                    {customers.map((c, i) => {
                      const done = isCollected(c.order.id, product.id);
                      return (
                        <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 14px", borderBottom:i<customers.length-1?`1px solid ${C.border}`:"none", background:done?C.successLight:"transparent", transition:"background 0.15s" }}>
                          <div style={{ flex:1 }}>
                            <div style={{ fontWeight:700, fontSize:14, textDecoration:done?"line-through":"none", color:done?C.success:C.text }}>{c.order.customerName}</div>
                            <div style={{ fontSize:12, color:C.textMuted }}>{fmtDate(c.order.deliveryDate)} {c.order.deliveryTime||""}</div>
                            {c.note && <div style={{ fontSize:12, color:C.warning }}>📌 {c.note}</div>}
                          </div>
                          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                            <span style={{ fontWeight:900, fontSize:18, color:done?C.success:C.gold }}>{c.qty}</span>
                            <button onClick={() => toggleCollect(c.order.id, product.id)}
                              style={{ background:done?C.success:C.surface, border:`2px solid ${done?C.success:C.border}`, borderRadius:8, padding:"6px 12px", fontWeight:800, fontSize:13, cursor:"pointer", fontFamily:"Heebo, sans-serif", color:done?"#fff":C.textMuted, transition:"all 0.15s" }}>
                              {done ? "✅ נאסף" : "⬜ אסוף"}
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {/* ── ORDERS TAB ── */}
      {activeTab === "orders" && (
        <div style={{ flex:1, overflowY:"auto", padding:12 }}>
          {routeOrders.length === 0 && (
            <div style={{ textAlign:"center", padding:40, color:C.textMuted }}>
              <div style={{ fontSize:32, marginBottom:8 }}>📭</div>
              <p>אין הזמנות</p>
            </div>
          )}
          {routeOrders.map(order => {
            const done = isOrderDone(order);
            const cnt = orderCollectedCount(order);
            const total = order.items?.length || 0;
            return (
              <div key={order.id} style={{ background:C.surface, borderRadius:14, border:`2px solid ${done?C.success:cnt>0?C.gold:C.border}`, padding:14, marginBottom:10 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:8 }}>
                  <div>
                    <div style={{ fontWeight:800, fontSize:15 }}>{order.customerName}</div>
                    <div style={{ fontSize:12, color:C.textMuted }}>{order.customerPhone}</div>
                    <div style={{ fontSize:12, color:C.textMuted }}>{fmtDate(order.deliveryDate)} {order.deliveryTime||""}</div>
                  </div>
                  <div style={{ background:done?C.successLight:cnt>0?C.warningLight:C.bg, border:`1px solid ${done?C.success:cnt>0?C.warning:C.border}`, borderRadius:8, padding:"3px 10px", fontSize:12, fontWeight:700, color:done?C.success:cnt>0?C.warning:C.textMuted }}>
                    {done?"✅ הושלם":cnt>0?`${cnt}/${total}`:"לא התחיל"}
                  </div>
                </div>
                {/* Items with collect buttons */}
                {(order.items||[]).map(item => {
                  const p = ctx.products.find(p=>p.id===item.productId);
                  const itemDone = isCollected(order.id, item.productId);
                  return p ? (
                    <div key={item.productId} onClick={() => toggleCollect(order.id, item.productId)}
                      style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 10px", marginBottom:4, borderRadius:8, border:`1.5px solid ${itemDone?C.success:C.border}`, background:itemDone?C.successLight:C.bg, cursor:"pointer", transition:"all 0.15s" }}>
                      <span style={{ fontWeight:600, fontSize:14, textDecoration:itemDone?"line-through":"none", color:itemDone?C.success:C.text }}>{p.name}</span>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <span style={{ fontWeight:800, fontSize:16, color:itemDone?C.success:C.gold }}>×{item.qty}</span>
                        <span style={{ fontSize:18 }}>{itemDone?"✅":"⬜"}</span>
                      </div>
                    </div>
                  ) : null;
                })}
              </div>
            );
          })}
        </div>
      )}

      {/* Completion modal – appears when order is fully collected */}
      {completionModal && (
        <Modal title="✅ הזמנה הושלמה!" onClose={() => { setCompletionModal(null); setDocType(null); }} width={360}>
          <div style={{ textAlign:"center", marginBottom:20 }}>
            <div style={{ fontSize:40, marginBottom:8 }}>🎉</div>
            <div style={{ fontWeight:800, fontSize:16 }}>{completionModal.customerName}</div>
            <div style={{ color:C.textMuted, fontSize:13 }}>{fmtDate(completionModal.deliveryDate)} {completionModal.deliveryTime||""}</div>
          </div>
          <p style={{ fontSize:14, fontWeight:600, marginBottom:14, textAlign:"center" }}>האם יצאה תעודה / חיוב?</p>
          <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:20 }}>
            {[
              ["invoice","🧾 חיוב / חשבונית"],
              ["delivery_note","📄 תעודת משלוח"],
              ["none","❌ לא יצאה תעודה"],
            ].map(([v,l]) => (
              <button key={v} onClick={() => setDocType(v)}
                style={{ padding:"12px 16px", borderRadius:10, border:`2px solid ${docType===v?C.gold:C.border}`, background:docType===v?C.gold+"18":C.surface, fontWeight:700, fontSize:14, cursor:"pointer", fontFamily:"Heebo, sans-serif", color:docType===v?C.gold:C.text, transition:"all 0.15s" }}>
                {l}
              </button>
            ))}
          </div>
          <button
            onClick={() => docType && completeOrderPickup(completionModal, docType)}
            disabled={!docType}
            style={{ width:"100%", padding:"13px 0", borderRadius:10, border:"none", background:docType?C.gold:"#ccc", color:docType?C.primary:"#fff", fontWeight:800, fontSize:15, cursor:docType?"pointer":"not-allowed", fontFamily:"Heebo, sans-serif" }}>
            {docType ? "✅ אשר וסגור הזמנה" : "בחר אפשרות תחילה"}
          </button>
          <p style={{ fontSize:12, color:C.textMuted, textAlign:"center", marginTop:10 }}>
            * כל המחלקות יסומנו כמוכן אוטומטית
          </p>
        </Modal>
      )}

      {/* Picking modal */}
      {pickingOrder && (
        <Modal title={`ניקוט – ${pickingOrder.customerName}`} onClose={() => setPickingOrder(null)} width={480}>
          {(pickingOrder.items||[]).map(item => {
            const p = ctx.products.find(p=>p.id===item.productId);
            const done = isCollected(pickingOrder.id, item.productId);
            return p ? (
              <div key={item.productId} onClick={() => toggleCollect(pickingOrder.id, item.productId)}
                style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"12px 14px", marginBottom:8, borderRadius:12, border:`2px solid ${done?C.success:C.border}`, background:done?C.successLight:C.surface, cursor:"pointer" }}>
                <span style={{ fontWeight:700, fontSize:15, textDecoration:done?"line-through":"none" }}>{p.name}</span>
                <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                  <span style={{ fontWeight:900, fontSize:18, color:done?C.success:C.gold }}>{item.qty}</span>
                  <span style={{ fontSize:20 }}>{done?"✅":"⬜"}</span>
                </div>
              </div>
            ) : null;
          })}
        </Modal>
      )}
    </div>
  );
}

function MonitorScreen({ ctx }) {
  const [filter, setFilter] = useState({ status: "all", date: "", search: "" });
  const [selectedOrder, setSelectedOrder] = useState(null);
  const [activeDept, setActiveDept] = useState(null);
  const [lastTap, setLastTap] = useState({});
  const [showRoutes, setShowRoutes] = useState(false);

  const filtered = ctx.orders
    .filter(o => {
      if (filter.status !== "all" && o.status !== filter.status) return false;
      if (filter.date && o.deliveryDate !== filter.date) return false;
      if (filter.search) {
        const q = filter.search.toLowerCase();
        if (!o.customerName?.includes(filter.search) && !o.customerPhone?.includes(filter.search)) return false;
      }
      if (activeDept) {
        return o.items?.some(item => {
          const p = ctx.products.find(p => p.id === item.productId);
          return p?.departments?.includes(activeDept);
        });
      }
      return true;
    })
    .sort((a, b) => {
      // ממתינות לאישור עולות ראשון
      const aPending = a.status === "pending" ? 0 : 1;
      const bPending = b.status === "pending" ? 0 : 1;
      if (aPending !== bPending) return aPending - bPending;
      // אחר כך לפי תאריך+שעה קרוב ביותר
      const da = new Date(a.deliveryDate + "T" + (a.deliveryTime || "00:00"));
      const db = new Date(b.deliveryDate + "T" + (b.deliveryTime || "00:00"));
      return da - db;
    });

  const updateOrderStatus = async (orderId, status) => {
    const updated = ctx.orders.map(o => o.id === orderId ? { ...o, status } : o);
    await ctx.saveOrders(updated);
    if (selectedOrder?.id === orderId) setSelectedOrder({ ...selectedOrder, status });
    ctx.showToast("סטטוס עודכן");
  };

  // Double-tap to open
  const handleTap = (order) => {
    const now = Date.now();
    const prev = lastTap[order.id] || 0;
    if (now - prev < 400) {
      // Double tap: toggle
      setSelectedOrder(s => s?.id === order.id ? null : order);
      setLastTap({});
    } else {
      // Single tap: open
      setSelectedOrder(order);
      setLastTap({ [order.id]: now });
    }
  };

  const statusColor = (s) => ({
    pending: C.warning, in_progress: C.primaryLight, ready: C.success, delivered: C.textMuted, cancelled: C.danger
  }[s] || C.textMuted);

  const statusBg = (s) => ({
    pending: C.warningLight, in_progress: "#EEF7FF", ready: C.successLight, delivered: "#F5F5F5", cancelled: C.dangerLight
  }[s] || C.bg);

  return (
    <div style={{ height: "100vh", background: C.bg, display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{ background: "#222222", padding: "14px 16px", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}><img src={LOGO_SRC} alt="" style={{ height:32, width:"auto" }} /><h2 style={{ color: C.gold, fontSize: 17, fontWeight: 900 }}>מוניטור הזמנות</h2></div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => { ctx.setUser(null); ctx.setNewOrderMode(true); ctx.setScreen("login"); }}
              style={{ background: "#B8965A", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "Heebo, sans-serif", display: "flex", alignItems: "center", gap: 6, boxShadow: "0 2px 8px rgba(184,150,90,0.4)" }}>
              ➕ הזמנה חדשה
            </button>
            <button onClick={() => setShowRoutes(true)}
              style={{ background: "rgba(255,255,255,0.15)", border: "1.5px solid rgba(255,255,255,0.4)", borderRadius: 10, padding: "8px 12px", color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "Heebo, sans-serif" }}>
              🚚 קווים
            </button>
            <button onClick={() => ctx.setScreen("manager")}
              style={{ background: "rgba(255,255,255,0.22)", border: "1.5px solid rgba(255,255,255,0.6)", borderRadius: 9, padding: "7px 14px", color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "Heebo, sans-serif" }}>
              ⚙️ ניהול
            </button>
            <button onClick={() => ctx.setScreen("login")}
              style={{ background: "rgba(255,255,255,0.12)", border: "1.5px solid rgba(255,255,255,0.35)", borderRadius: 9, padding: "7px 14px", color: "#ffffffcc", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "Heebo, sans-serif" }}>
              ← יציאה
            </button>
          </div>
        </div>
        {/* Dept filter tabs – tap to filter, long-press hint to go to dept */}
        <div style={{ display: "flex", gap: 5, overflowX: "auto", paddingBottom: 2 }}>
          <button onClick={() => setActiveDept(null)} style={{
            flex: "none", padding: "6px 14px", borderRadius: 20, border: "none",
            background: !activeDept ? C.accent : "rgba(255,255,255,0.15)",
            color: "#fff", fontWeight: 700, fontSize: 13, cursor: "pointer"
          }}>📋 הכל</button>
          {DEPARTMENTS.map(d => (
            <button key={d}
              onClick={() => { ctx.setInitialDept(d); ctx.setScreen("dept"); }}
              style={{
                flex: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
                padding: "8px 14px", borderRadius: 14, border: "none",
                background: activeDept === d ? C.dept[d] : "rgba(255,255,255,0.15)",
                color: "#fff", cursor: "pointer", transition: "all 0.15s",
                boxShadow: activeDept === d ? `0 2px 8px ${C.dept[d]}88` : "none",
                minWidth: 60
              }}>
              <span style={{ fontSize: 24 }}>{DEPT_ICONS[d]}</span>
              <span style={{ fontSize: 11, fontWeight: 700 }}>{d}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Filters */}
      <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "10px 12px", display: "flex", gap: 8, flexShrink: 0, overflowX: "auto" }}>
        <input value={filter.search} onChange={e => setFilter({ ...filter, search: e.target.value })}
          placeholder="🔍 חיפוש..."
          style={{ flex: 1, minWidth: 100, padding: "7px 10px", border: `1.5px solid ${C.border}`, borderRadius: 8, fontSize: 13, fontFamily: "Heebo, sans-serif" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 4, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: "7px 10px", background: filter.date ? C.primary+"11" : C.surface }}>
          <span style={{ fontSize: 13, color: C.textMuted, whiteSpace: "nowrap" }}>📅</span>
          <input value={filter.date} onChange={e => setFilter({ ...filter, date: e.target.value })} type="date"
            style={{ border: "none", outline: "none", fontSize: 13, background: "transparent", fontFamily: "Heebo, sans-serif" }} />
          {filter.date && <button onClick={() => setFilter({...filter, date: ""})} style={{ border: "none", background: "none", cursor: "pointer", color: C.danger, fontSize: 14, padding: 0 }}>✕</button>}
        </div>
        <select value={filter.status} onChange={e => setFilter({ ...filter, status: e.target.value })}
          style={{ padding: "7px 10px", border: `1.5px solid ${C.border}`, borderRadius: 8, fontSize: 13, fontFamily: "Heebo, sans-serif" }}>
          <option value="all">כל הסטטוסים</option>
          {Object.entries(STATUS_LABELS).map(([v, l]) => <option key={v} value={v}>{l}</option>)}
        </select>
      </div>

      {/* Stats bar */}
      <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "8px 16px", display: "flex", gap: 20, flexShrink: 0 }}>
        {[
          { label: 'סה"כ', val: ctx.orders.length, color: C.primary },
          { label: "ממתין", val: ctx.orders.filter(o => o.status === "pending").length, color: C.warning },
          { label: "בביצוע", val: ctx.orders.filter(o => o.status === "in_progress").length, color: C.primaryLight },
          { label: "מוכן", val: ctx.orders.filter(o => o.status === "ready").length, color: C.success },
        ].map(s => (
          <div key={s.label} style={{ textAlign: "center" }}>
            <div style={{ fontSize: 18, fontWeight: 800, color: s.color }}>{s.val}</div>
            <div style={{ fontSize: 11, color: C.textMuted }}>{s.label}</div>
          </div>
        ))}
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "flex-start" }}>
          <span style={{ fontSize: 12, color: C.textMuted }}>לחץ על בון לפתיחה</span>
        </div>
      </div>

      {/* Product summary in monitor */}
      {/* Bons – grouped by day, horizontal scroll per day */}
      {filtered.length === 0 ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", color: C.textMuted }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📋</div>
          <p>אין הזמנות</p>
        </div>
      ) : (
        <div style={{ flex: 1, overflowY: "auto" }}>
          {(() => {
            // Group by delivery date
            const groups = {};
            filtered.forEach(order => {
              const d = order.deliveryDate;
              if (!groups[d]) groups[d] = [];
              groups[d].push(order);
            });
            return Object.entries(groups).sort(([a],[b]) => a.localeCompare(b)).map(([date, orders]) => {
              const dt = new Date(date);
              const isToday = date === today();
              const isTomorrow = date === (() => { const d=new Date(); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); })();
              const dayLabel = isToday ? "היום" : isTomorrow ? "מחר" : dt.toLocaleDateString("he-IL", { weekday:"short", day:"numeric", month:"numeric" });
              return (
                <div key={date} style={{ marginBottom: 4 }}>
                  {/* Day header */}
                  <div style={{ padding: "8px 16px 4px", display: "flex", alignItems: "center", gap: 10, position: "sticky", top: 0, background: C.bg, zIndex: 5 }}>
                    <div style={{ fontWeight: 800, fontSize: 14, color: isToday ? C.gold : C.primary }}>{dayLabel}</div>
                    <div style={{ flex: 1, height: 1, background: C.border }} />
                    <div style={{ fontSize: 12, color: C.textMuted }}>{orders.length} הזמנות</div>
                  </div>
                  {/* Horizontal scroll for this day */}
                  <div style={{ overflowX: "auto", display: "flex", gap: 12, padding: "4px 16px 12px" }}>
                    {orders.map(order => {
                      const totalQty = order.items?.reduce((s, i) => s + i.qty, 0) || 0;
                      const bg = statusBg(order.status);
                      const border = statusColor(order.status);
                      return (
                        <div key={order.id}
                          onClick={() => handleTap(order)}
                          style={{
                            flex: "none", width: 230, minHeight: 260,
                            background: bg, border: `2px solid ${border}`,
                            opacity: order.status === "pending" ? 0.75 : 1,
                            borderRadius: 14, padding: 14, cursor: "pointer",
                            userSelect: "none", transition: "transform 0.1s",
                            boxShadow: lastTap[order.id] ? `0 0 0 3px ${border}44` : "0 2px 8px rgba(0,0,0,0.08)",
                            transform: lastTap[order.id] ? "scale(0.97)" : "scale(1)",
                            display: "flex", flexDirection: "column", gap: 8
                          }}>
                          {/* Bon header */}
                          <div style={{ borderBottom: `1px dashed ${border}66`, paddingBottom: 8 }}>
                            {order.status === "pending" && (
                              <div style={{ background: C.warning, color: "#fff", borderRadius: 6, padding: "3px 10px", fontSize: 11, fontWeight: 800, marginBottom: 6, textAlign: "center" }}>
                                ⚠️ ממתין לאישור קבלה
                              </div>
                            )}
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                              <div style={{ fontWeight: 800, fontSize: 14, lineHeight: 1.2 }}>{order.customerName}</div>
                              <div style={{ background: border, color: "#fff", borderRadius: 6, padding: "2px 8px", fontSize: 11, fontWeight: 700, flexShrink: 0 }}>
                                {STATUS_LABELS[order.status]}
                              </div>
                            </div>
                            <div style={{ fontSize: 12, color: C.textMuted, marginTop: 3 }}>{order.customerPhone}</div>
                          </div>
                          {/* Time + pickup */}
                          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                            <div>
                              <div style={{ fontWeight: 700 }}>{order.deliveryTime || ""}</div>
                            </div>
                            <div>
                              <div style={{ fontWeight: 700 }}>{order.pickupType === "delivery" ? "🚚" : "🏪"}</div>
                              {order.customerType === "business" && <div style={{ color: C.gold, fontWeight: 600, fontSize: 10 }}>עסקי</div>}
                            </div>
                          </div>
                          {/* Items */}
                          <BonItemsList order={order} ctx={ctx} border={border} />
                          {/* Notes + total */}
                          <div style={{ borderTop: `1px dashed ${border}44`, paddingTop: 8, marginTop: "auto" }}>
                            {order.note && <div style={{ fontSize: 11, color: C.warning, marginBottom: 3 }}>📝 {order.note.slice(0,35)}...</div>}
                            {order.items?.some(i=>i.shortage) && <div style={{ fontSize: 11, color: C.danger, fontWeight: 700, marginBottom: 3 }}>⚠️ יש חוסרים</div>}
                            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12 }}>
                              <span style={{ color: C.textMuted }}>{totalQty} יח׳</span>
                              <span style={{ fontWeight: 700, color: C.gold }}>₪{fmt(order.items?.reduce((s,i)=>{ const p=ctx.products.find(p=>p.id===i.productId); return s+(p?p.price*i.qty:0); },0)||0)}</span>
                            </div>
                          </div>
                          {/* Dept progress */}
                          <div style={{ display: "flex", gap: 3 }}>
                            {DEPARTMENTS.filter(d=>d!=="שילוח").map(d => {
                              const rel = order.items?.some(item => { const p=ctx.products.find(p=>p.id===item.productId); return p?.departments?.includes(d); });
                              if (!rel) return null;
                              const ds = order.deptStatus?.[d]||"pending";
                              return <div key={d} title={d} style={{ flex:1, height:4, borderRadius:2, background:ds==="ready"?C.dept[d]:ds==="in_progress"?C.dept[d]+"66":"#ddd" }} />;
                            })}
                          </div>
                          <div style={{ fontSize: 10, color: C.textMuted, textAlign: "center" }}>לחץ לפתיחה</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            });
          })()}
        </div>
      )}

      {selectedOrder && (
        <OrderDetailModal
          order={selectedOrder}
          ctx={ctx}
          onClose={() => setSelectedOrder(null)}
          onStatusChange={updateOrderStatus}
        />
      )}
      {showRoutes && (
        <RouteScreen ctx={ctx} onClose={() => setShowRoutes(false)} />
      )}
    </div>
  );
}

function OrderDetailModal({ order, ctx, onClose, onStatusChange }) {
  const itemsWithNotes = (order.items||[]).filter(i=>i.note?.trim());
  const [genConfirmed, setGenConfirmed] = useState(false);
  const [itemConfirmed, setItemConfirmed] = useState({});
  const [warn, setWarn] = useState(false);

  const hasGenNote = !!(order.note?.trim());
  const isConfirmed = ["confirmed","in_progress","ready","delivered"].includes(order.status);

  // If already confirmed, skip ALL note confirmation requirements
  const allConfirmed = isConfirmed || (
    (!hasGenNote || genConfirmed) &&
    itemsWithNotes.every(i => itemConfirmed[i.productId])
  );
  
  // Auto-confirm notes for already-confirmed orders
  const effectiveGenConfirmed = isConfirmed || genConfirmed;
  const effectiveItemConfirmed = (pid) => isConfirmed || itemConfirmed[pid];

  const total = (order.items||[]).reduce((s,i)=>{
    const p=ctx.products.find(p=>p.id===i.productId);
    return s+(p?p.price*i.qty:0);
  },0);

  const handleConfirm = () => {
    if (!allConfirmed) { setWarn(true); setTimeout(()=>setWarn(false),3500); return; }
    onStatusChange(order.id,"confirmed");
  };

  return (
    <Modal title={`הזמנה – ${order.customerName}`} onClose={onClose} width={500}>
      {warn && (
        <div style={{background:C.dangerLight,border:`2px solid ${C.danger}`,borderRadius:10,padding:10,marginBottom:12,fontWeight:700,fontSize:14,color:C.danger,textAlign:"center"}}>
          ⛔ יש לאשר את כל ההערות לפני אישור ההזמנה
        </div>
      )}

      {/* מידע ראשי */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",background:C.bg,borderRadius:10,padding:"10px 14px",marginBottom:14}}>
        <div>
          <div style={{fontWeight:800,fontSize:16}}>{fmtDate(order.deliveryDate)} {order.deliveryTime||""}</div>
          <div style={{fontSize:13,color:C.textMuted,marginTop:2}}>{order.pickupType==="delivery"?"🚚 שילוח":"🏪 איסוף"} · {order.customerType==="business"?"עסקי":"פרטי"}</div>
          <div style={{fontSize:13,color:C.textMuted}}>{order.customerPhone}</div>
        </div>
        <div style={{textAlign:"left"}}>
          <div style={{background:isConfirmed?C.successLight:C.warningLight,color:isConfirmed?C.success:C.warning,borderRadius:8,padding:"3px 10px",fontWeight:700,fontSize:12}}>
            {STATUS_LABELS[order.status]||order.status}
          </div>
          <div style={{fontWeight:800,color:C.accent,fontSize:16,marginTop:5}}>₪{fmt(total)}</div>
        </div>
      </div>

      {/* הערה כללית – אישור רק כשעדיין pending */}
      {hasGenNote && (
        <div style={{background:(!effectiveGenConfirmed)?"#FFF8E1":C.successLight, border:`2px solid ${(!effectiveGenConfirmed)?"#F59E0B":C.success}`,borderRadius:12,padding:14,marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <span>📋</span>
            <span style={{fontWeight:800,fontSize:14,color:(!effectiveGenConfirmed)?"#92400E":C.success}}>הערה כללית להזמנה</span>
            {effectiveGenConfirmed&&<span>✅</span>}
          </div>
          <div style={{fontSize:15,fontWeight:600,marginBottom:(!effectiveGenConfirmed)?10:0}}>{order.note}</div>
          {/* כפתור אישור רק כשהזמנה עוד לא אושרה */}
          {!effectiveGenConfirmed && (
            <button onClick={()=>setGenConfirmed(true)}
              style={{background:"#F59E0B",border:"none",borderRadius:8,color:"#fff",padding:"8px 0",fontWeight:700,cursor:"pointer",fontFamily:"Heebo, sans-serif",fontSize:14,width:"100%"}}>
              ✓ קראתי ומאשר
            </button>
          )}
        </div>
      )}

      {/* פריטים */}
      <div style={{borderTop:`1px solid ${C.border}`,paddingTop:12,marginBottom:14}}>
        {order.items?.map(item=>{
          const p=ctx.products.find(p=>p.id===item.productId);
          const noteConf=itemConfirmed[item.productId];
          return p?(
            <div key={item.productId} style={{marginBottom:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 10px",background:C.bg,borderRadius:item.note?.trim()?"8px 8px 0 0":8}}>
                <span style={{fontWeight:600,fontSize:14}}>{p.name}</span>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontWeight:700}}>×{item.qty}</span>
                  <span style={{color:C.accent,fontWeight:700}}>₪{p.price*item.qty}</span>
                </div>
              </div>
              {/* הערת פריט – אישור רק כשעדיין pending */}
              {item.note?.trim()&&(
                <div style={{background:effectiveItemConfirmed(item.productId)?C.successLight:"#FFF3CD",border:`1.5px solid ${effectiveItemConfirmed(item.productId)?C.success:"#FFC107"}`,borderTop:"none",borderRadius:"0 0 8px 8px",padding:"7px 12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,fontWeight:700,color:"#92400E",marginBottom:1}}>📌 הערה לפריט</div>
                      <div style={{fontSize:13}}>{item.note}</div>
                    </div>
                    {effectiveItemConfirmed(item.productId)
                      ?<span style={{color:C.success,fontWeight:700,fontSize:13}}>✅</span>
                      :<button onClick={()=>setItemConfirmed(p=>({...p,[item.productId]:true}))}
                          style={{background:"#FFC107",border:"none",borderRadius:6,color:"#fff",padding:"5px 12px",fontWeight:700,cursor:"pointer",fontFamily:"Heebo, sans-serif",fontSize:12,whiteSpace:"nowrap"}}>✓ אישור</button>}
                  </div>
                </div>
              )}
            </div>
          ):null;
        })}
      </div>

      {/* מידע נוסף */}
      <details style={{marginBottom:14}}>
        <summary style={{cursor:"pointer",fontSize:13,color:C.textMuted,padding:"6px 0"}}>▼ מידע נוסף</summary>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:8}}>
          {[["טלפון",order.customerPhone],["תשלום",order.paymentMethod||"לא הוגדר"],
            ["נוצר",new Date(order.createdAt).toLocaleTimeString("he-IL",{hour:"2-digit",minute:"2-digit"})],
            ["קו",order.routeId||"—"]].map(([k,v])=>(
            <div key={k} style={{background:C.bg,borderRadius:8,padding:"7px 10px"}}>
              <div style={{fontSize:11,color:C.textMuted}}>{k}</div>
              <div style={{fontSize:13,fontWeight:600}}>{v}</div>
            </div>
          ))}
        </div>
      </details>

      {/* כפתור אישור ראשי – רק כשממתין */}
      {!isConfirmed?(
        <div>
          {!allConfirmed&&(
            <div style={{background:"#FFF3CD",border:"2px solid #FFC107",borderRadius:10,padding:"9px 14px",marginBottom:10}}>
              <div style={{fontWeight:800,fontSize:13,color:"#92400E",marginBottom:3}}>⚠️ יש לאשר את כל ההערות תחילה</div>
              {hasGenNote&&!genConfirmed&&<div style={{fontSize:12,color:"#78350F"}}>• הערה כללית – טרם אושרה</div>}
              {itemsWithNotes.filter(i=>!itemConfirmed[i.productId]).map(i=>{
                const p=ctx.products.find(p=>p.id===i.productId);
                return <div key={i.productId} style={{fontSize:12,color:"#78350F"}}>• הערה ל"{p?.name}" – טרם אושרה</div>;
              })}
            </div>
          )}
          <button onClick={handleConfirm}
            style={{width:"100%",padding:"14px 0",background:allConfirmed?C.primary:"#9E9E9E",border:"none",borderRadius:10,color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer",fontFamily:"Heebo, sans-serif",boxShadow:allConfirmed?"0 4px 12px rgba(44,95,46,0.3)":"none"}}>
            {allConfirmed?"✅ אישור קבלת ההזמנה – התחל עבודה":"🔒 אשר הערות תחילה"}
          </button>
        </div>
      ):(
        <div>
          <div style={{background:C.successLight,border:`1.5px solid ${C.success}`,borderRadius:10,padding:10,marginBottom:12,textAlign:"center",fontWeight:700,color:C.success,fontSize:14}}>
            ✅ ההזמנה אושרה – הטיפול מתבצע במחלקות
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn size="sm" variant="ghost" onClick={()=>onStatusChange(order.id,"delivered")}>נמסר ✓</Btn>
            <Btn size="sm" variant="danger" onClick={()=>onStatusChange(order.id,"cancelled")}>בטל</Btn>
          </div>
        </div>
      )}

      {/* כפתור סגירה תחתון */}
      <div style={{borderTop:`1px solid ${C.border}`,marginTop:16,paddingTop:12,textAlign:"center"}}>
        <button onClick={onClose}
          style={{background:"none",border:`1.5px solid ${C.border}`,borderRadius:10,padding:"9px 32px",color:C.textMuted,fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"Heebo, sans-serif"}}>
          סגור ✕
        </button>
      </div>
    </Modal>
  );
}

function DeptScreen({ ctx }) {
  const [dept, setDept] = useState(ctx.initialDept || DEPARTMENTS[0]);
  const [langMode, setLangMode] = useState("he");
  const t = (he, hi) => langMode === "hi" ? hi : he;
  const deptColor = C.dept[dept] || C.primary;

  const [showSummary, setShowSummary] = useState(false);
  const [summaryScreen, setSummaryScreen] = useState(false);

  // Product summary for this dept across all active orders
  const productSummary = {};
  ctx.orders.filter(o => ["confirmed","in_progress","ready"].includes(o.status)).forEach(order => {
    (order.items||[]).forEach(item => {
      const p = ctx.products.find(p => p.id === item.productId);
      if (!p?.departments?.includes(dept)) return;
      if (!productSummary[item.productId]) productSummary[item.productId] = { product: p, total: 0, entries: [] };
      productSummary[item.productId].total += item.qty;
      productSummary[item.productId].entries.push({ order, qty: item.qty, note: item.note });
    });
  });

  // ALL orders that have items for this dept (including pending – shown as waiting)
  const allDeptOrders = ctx.orders.filter(o =>
    o.status !== "cancelled" && o.status !== "delivered" &&
    o.items?.some(item => {
      const p = ctx.products.find(p => p.id === item.productId);
      return p?.departments?.includes(dept);
    })
  ).sort((a, b) => {
    // pending first, then by date
    const ap = a.status === "pending" ? 0 : 1;
    const bp = b.status === "pending" ? 0 : 1;
    if (ap !== bp) return ap - bp;
    return new Date(a.deliveryDate + "T" + (a.deliveryTime||"00:00")) - new Date(b.deliveryDate + "T" + (b.deliveryTime||"00:00"));
  });

  return (
    <div style={{ height: "100vh", background: C.bg, display: "flex", flexDirection: "column" }}>
      {/* Top bar */}
      <div style={{ background: deptColor, padding: "10px 16px 8px", flexShrink: 0 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}><img src={LOGO_SRC} alt="" style={{ height:26, width:"auto" }} /><h2 style={{ color: C.gold, fontSize: 16, fontWeight: 800 }}>{DEPT_ICONS[dept]} {t(`מחלקת ${dept}`, DEPT_HI[dept])}</h2></div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={() => setLangMode(langMode === "he" ? "hi" : "he")}
              style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 8, padding: "4px 10px", color: "#fff", cursor: "pointer", fontSize: 13 }}>
              {langMode === "he" ? "हिं" : "עב"}
            </button>
            <button onClick={() => { ctx.setUser(null); ctx.setNewOrderMode(true); ctx.setScreen("login"); }}
              style={{ background: C.accent, border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "Heebo, sans-serif", display: "flex", alignItems: "center", gap: 5, boxShadow: "0 2px 8px rgba(200,135,58,0.4)" }}>
              ➕ {t("הזמנה חדשה","नया ऑर्डर")}
            </button>
            <button onClick={() => ctx.setScreen("monitor")}
              style={{ background: "rgba(255,255,255,0.2)", border: "1.5px solid rgba(255,255,255,0.5)", borderRadius: 10, padding: "7px 14px", color: "#fff", fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "Heebo, sans-serif", display: "flex", alignItems: "center", gap: 5 }}>
              <span style={{fontSize:18}}>📡</span> {t("מוניטור","मॉनिटर")}
            </button>
          </div>
        </div>
      </div>

      {/* Summary button – opens full screen */}
      <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "8px 14px", flexShrink: 0 }}>
        <button onClick={() => setSummaryScreen(true)}
          style={{ width: "100%", padding: "10px 16px", background: deptColor+"15", border: `1.5px solid ${deptColor}44`, borderRadius: 10, cursor: "pointer", fontFamily: "Heebo, sans-serif", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 700, fontSize: 14, color: deptColor }}>📊 {t("סיכום מוצרים","उत्पाद सारांश")}</span>
          <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
            {Object.values(productSummary).slice(0,3).map(({product,total}) => (
              <span key={product.id} style={{ background: deptColor+"22", color: deptColor, borderRadius: 6, padding: "2px 8px", fontSize: 12, fontWeight: 700 }}>
                {product.name.split(" ")[0]}: {total}
              </span>
            ))}
            <span style={{ color: deptColor, fontWeight: 800, fontSize: 16 }}>→</span>
          </div>
        </button>
      </div>

      {/* Summary full screen overlay */}
      {summaryScreen && (
        <div style={{ position: "fixed", inset: 0, background: C.bg, zIndex: 500, display: "flex", flexDirection: "column" }}>
          <div style={{ background: deptColor, padding: "14px 16px", display: "flex", alignItems: "center", gap: 12, flexShrink: 0 }}>
            <button onClick={() => setSummaryScreen(false)}
              style={{ background: "rgba(255,255,255,0.2)", border: "none", borderRadius: 8, padding: "6px 14px", color: "#fff", fontWeight: 700, cursor: "pointer", fontFamily: "Heebo, sans-serif", fontSize: 14 }}>← {t("חזרה","वापस")}</button>
            <h2 style={{ color: "#fff", fontWeight: 800, fontSize: 16 }}>{DEPT_ICONS[dept]} {t(`סיכום מחלקת ${dept}`, `${DEPT_HI[dept]} सारांश`)}</h2>
          </div>
          <div style={{ flex: 1, overflowY: "auto", padding: 14 }}>
            {Object.values(productSummary).length === 0 ? (
              <div style={{ textAlign: "center", padding: 48, color: C.textMuted }}>
                <div style={{ fontSize: 36, marginBottom: 10 }}>📋</div>
                <p>{t("אין מוצרים פעילים","कोई उत्पाद नहीं")}</p>
              </div>
            ) : (
              Object.values(productSummary).map(({ product, total, entries }) => (
                <ProductSummaryRow key={product.id} product={product} total={total} entries={entries} deptColor={deptColor} t={t} />
              ))
            )}
          </div>
        </div>
      )}


      {/* Sticky dept tabs */}
      <div style={{ background: deptColor, borderBottom: "3px solid rgba(0,0,0,0.15)", flexShrink: 0 }}>
        <div style={{ display: "flex", overflowX: "auto", padding: "0 8px" }}>
          {DEPARTMENTS.map(d => (
            <button key={d} onClick={() => setDept(d)} style={{
              flex: "none", padding: "8px 14px", border: "none",
              background: "transparent",
              borderBottom: dept === d ? "3px solid #fff" : "3px solid transparent",
              color: dept === d ? "#fff" : "rgba(255,255,255,0.55)",
              fontWeight: dept === d ? 800 : 600, fontSize: 13,
              cursor: "pointer", fontFamily: "Heebo, sans-serif",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 2
            }}>
              <span style={{ fontSize: 20 }}>{DEPT_ICONS[d]}</span>
              <span>{langMode === "hi" ? DEPT_HI[d] : d}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Orders – horizontal scroll like monitor bons */}
      {allDeptOrders.length === 0 ? (
        <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", color: C.textMuted }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>✅</div>
          <p style={{ fontWeight: 600 }}>{t("אין הזמנות","कोई ऑर्डर नहीं")}</p>
        </div>
      ) : (
        <div style={{ flex: 1, overflowX: "auto", overflowY: "hidden", display: "flex", gap: 14, padding: "14px 14px", alignItems: "flex-start", scrollSnapType: "x mandatory" }}>
          {allDeptOrders.map(order => (
            <DeptOrderCard key={order.id + dept}
              order={order} dept={dept} deptColor={deptColor}
              t={t} ctx={ctx}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// ─── DEPT ORDER CARD ──────────────────────────────────────────────────────────────
function DeptOrderCard({ order, dept, deptColor, t, ctx }) {
  const isPending = order.status === "pending";
  const requiresGenNote = ["אריזה","שילוח"].includes(dept);

  const allItems = (order.items||[]).map(item => {
    const p = ctx.products.find(p => p.id === item.productId);
    return { ...item, _name: p?.name||"?", _depts: p?.departments||[], isMine: (p?.departments||[]).includes(dept) };
  });
  const myItems = allItems.filter(i => i.isMine);
  const otherItems = allItems.filter(i => !i.isMine);

  // State at top level – no hooks in loops
  const [itemSt, setItemSt] = useState(
    () => Object.fromEntries(myItems.map(i => [i.productId, "pending"]))
  );
  const [itemNoteConf, setItemNoteConf] = useState({});
  const [genNoteConf, setGenNoteConf] = useState(false);
  const [showFinish, setShowFinish] = useState(false);
  // Partial qty: {productId: actualQty} – when less than ordered
  const [partialQty, setPartialQty] = useState({});
  const [showPartial, setShowPartial] = useState(null); // productId being edited

  const deptDone = (order.deptStatus?.[dept]||"pending") === "ready";
  const allMyDone = myItems.length > 0 && myItems.every(i => (itemSt[i.productId]||"pending") === "ready");
  const canFinish = allMyDone && (!requiresGenNote || !order.note?.trim() || genNoteConf);

  const setSt = (pid, st) => {
    setItemSt(prev => ({...prev, [pid]: st}));
    // When marking ready: auto-cascade earlier depts for this product
    if (st === "ready") {
      const myIdx = DEPT_ORDER[dept];
      const item = allItems.find(i => i.productId === pid);
      const prevDepts = (item?._depts || []).filter(d => DEPT_ORDER[d] < myIdx);
      if (prevDepts.length > 0) {
        // Auto-mark earlier depts as done for this order
        const updated = ctx.orders.map(o => {
          if (o.id !== order.id) return o;
          let ds = {...(o.deptStatus||{})};
          prevDepts.forEach(d => { ds[d] = "ready"; });
          return {...o, deptStatus: ds};
        });
        ctx.saveOrders(updated);
        if (prevDepts.length > 0) {
          ctx.showToast(t(`✓ אושר גם ב: ${prevDepts.join(", ")}`, `✓ ${prevDepts.join(", ")} में भी स्वीकृत`));
        }
      }
    }
  };
  const confItemNote = (pid) => setItemNoteConf(prev => ({...prev, [pid]: true}));

  const handleFinish = () => {
    const myIdx = DEPT_ORDER[dept];
    const updated = ctx.orders.map(o => {
      if (o.id !== order.id) return o;
      let ds = {...o.deptStatus, [dept]: "ready"};
      DEPARTMENTS.forEach(d => {
        if (DEPT_ORDER[d] < myIdx) {
          const has = o.items?.some(i => {
            const p = ctx.products.find(p => p.id === i.productId);
            return p?.departments?.includes(d);
          });
          if (has) ds[d] = "ready";
        }
      });
      return {...o, deptStatus: ds};
    });
    ctx.saveOrders(updated);
    ctx.showToast(t("✓ מחלקה סיימה","✓ पूर्ण"));
    setShowFinish(false);
  };

  return (
    <Card style={{ padding: 0, overflow: "hidden", flex: "none", width: "min(320px, calc(100vw - 28px))",
      border: `2px solid ${isPending ? C.border : deptDone ? C.success : deptColor+"44"}`,
      opacity: isPending ? 0.75 : 1
    }}>

      {/* Header */}
      <div style={{ background: isPending ? C.bg : deptDone ? C.successLight : deptColor+"10", borderBottom: `1.5px solid ${isPending ? C.border : deptDone ? C.success : deptColor+"22"}`, padding: "10px 14px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <div style={{ fontWeight: 800, fontSize: 15 }}>{order.customerName}</div>
          <div style={{ fontSize: 12, color: C.textMuted }}>{fmtDate(order.deliveryDate)} {order.deliveryTime||""} · {order.pickupType==="delivery"?"🚚":"🏪"}</div>
        </div>
        <div style={{
          background: isPending ? C.warningLight : deptDone ? C.success : allMyDone ? C.warning : "transparent",
          color: isPending ? C.warning : deptDone||allMyDone ? "#fff" : C.textMuted,
          border: isPending||deptDone||allMyDone ? "none" : `1px solid ${C.border}`,
          borderRadius: 8, padding: "3px 12px", fontSize: 12, fontWeight: 700
        }}>
          {isPending ? t("⏳ ממתין לאישור מוניטור","⏳ प्रतीक्षारत") : deptDone ? "✓ סיים" : allMyDone ? "להסיים?" : t("בעבודה","काम")}
        </div>
      </div>

      <div style={{ padding: "10px 14px" }}>

        {/* הזמנה ממתינה – לא ניתן לפעול, מציג מוצרים בלבד */}
        {isPending && (
          <div>
            <div style={{ background: "#FFFBEB", border: `1px solid #F59E0B`, borderRadius: 8, padding: "10px 14px", marginBottom: 10, textAlign: "center" }}>
              <div style={{ fontWeight: 700, color: C.warning, fontSize: 14 }}>⏳ {t("ממתין לאישור במוניטור","मॉनिटर में प्रतीक्षारत")}</div>
              <div style={{ fontSize: 12, color: C.textMuted, marginTop: 3 }}>{t("לא ניתן לטפל עד לאישור","स्वीकृति तक कार्रवाई नहीं")}</div>
            </div>
            {/* Show items read-only */}
            {allItems.map(item => (
              <div key={item.productId} style={{ display: "flex", justifyContent: "space-between", padding: "6px 8px", marginBottom: 4, background: C.bg, borderRadius: 6, opacity: item.isMine ? 0.8 : 0.35 }}>
                <span style={{ fontSize: 13, fontWeight: item.isMine ? 600 : 400, color: item.isMine ? C.text : C.textMuted }}>{item._name}</span>
                <span style={{ fontSize: 13, color: C.textMuted }}>×{item.qty}</span>
              </div>
            ))}
          </div>
        )}

        {/* הזמנה מאושרת – עבודה */}
        {!isPending && (
          <>
            {/* הערה כללית – גלויה לכולם, אישור רק לאריזה/שילוח */}
            {order.note?.trim() && (
              <div style={{ marginBottom: 10, background: (requiresGenNote ? genNoteConf : true) ? "#F0FFF4" : "#FFF8E1", border: `1.5px solid ${(requiresGenNote ? genNoteConf : true) ? C.success+"66" : "#F59E0B"}`, borderRadius: 8, padding: "8px 12px" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#92400E", marginBottom: 3 }}>📋 {t("הערה כללית להזמנה","सामान्य नोट")}</div>
                <div style={{ fontSize: 13, marginBottom: requiresGenNote && !genNoteConf ? 8 : 0 }}>{order.note}</div>
                {requiresGenNote && !genNoteConf && (
                  <button onClick={() => setGenNoteConf(true)} style={{ background: "#F59E0B", border: "none", borderRadius: 6, color: "#fff", padding: "5px 0", fontWeight: 700, cursor: "pointer", fontFamily: "Heebo, sans-serif", fontSize: 12, width: "100%" }}>
                    ✓ {t("קראתי ומאשר","पुष्टि")}
                  </button>
                )}
                {requiresGenNote && genNoteConf && <span style={{ color: C.success, fontWeight: 700, fontSize: 12 }}>✅ {t("אושר","पुष्टि")}</span>}
              </div>
            )}

            {/* MY ITEMS – active */}
            {myItems.map(item => {
              const st = itemSt[item.productId]||"pending";
              const noteNeeded = !!(item.note?.trim() && !itemNoteConf[item.productId]);
              const isDone = deptDone || st === "ready";
              return (
                <div key={item.productId} style={{ marginBottom: 8 }}>
                  <div style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "9px 10px",
                    background: isDone ? C.successLight : st==="in_progress" ? C.warningLight : deptColor+"08",
                    border: `1px solid ${isDone ? C.success+"44" : st==="in_progress" ? C.warning+"55" : deptColor+"22"}`,
                    borderRadius: item.note?.trim() ? "8px 8px 0 0" : 8,
                    opacity: isDone ? 0.65 : 1,
                    transition: "all 0.2s"
                  }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <span style={{ fontWeight: isDone ? 400 : 800, fontSize: 15, color: isDone ? C.textMuted : C.text }}>{item._name}</span>
                      <span style={{ fontWeight: 700, fontSize: 14, color: deptColor, marginRight: 6 }}> {item.qty}</span>
                    </div>
                    {!deptDone && (
                      <div style={{ display: "flex", gap: 5, flexShrink: 0 }}>
                        <button
                          onClick={() => { if (!noteNeeded && st === "pending") setSt(item.productId, "in_progress"); }}
                          style={{
                            padding: "5px 11px", borderRadius: 7, fontFamily: "Heebo, sans-serif", fontSize: 12, fontWeight: 700,
                            cursor: (!noteNeeded && st==="pending") ? "pointer" : "default",
                            border: `1.5px solid ${st==="in_progress" ? C.warning : noteNeeded ? "#e0e0e0" : C.warning+"66"}`,
                            background: st==="in_progress" ? C.warning : "transparent",
                            color: st==="in_progress" ? "#fff" : noteNeeded ? "#ccc" : C.warning,
                            minWidth: 58, textAlign: "center", transition: "all 0.15s"
                          }}>
                          {st==="in_progress" ? "▶ בהכנה" : "בהכנה"}
                        </button>
                        <button
                          onClick={() => { if (st==="in_progress") setSt(item.productId, "ready"); }}
                          style={{
                            padding: "5px 11px", borderRadius: 7, fontFamily: "Heebo, sans-serif", fontSize: 12, fontWeight: 700,
                            cursor: st==="in_progress" ? "pointer" : "default",
                            border: `1.5px solid ${st==="ready" ? C.success : st==="in_progress" ? C.success : "#e0e0e0"}`,
                            background: st==="ready" ? C.success : "transparent",
                            color: st==="ready" ? "#fff" : st==="in_progress" ? C.success : "#ccc",
                            minWidth: 52, textAlign: "center", transition: "all 0.15s"
                          }}>
                          {st==="ready" ? "✓ מוכן" : "מוכן"}
                        </button>
                        {/* Partial qty button – only in_progress */}
                        {st === "in_progress" && (
                          <button
                            onClick={() => setShowPartial(item.productId)}
                            style={{ padding: "5px 8px", borderRadius: 7, fontFamily: "Heebo, sans-serif", fontSize: 11, fontWeight: 700, cursor: "pointer", border: `1.5px solid ${C.warning}`, background: partialQty[item.productId] !== undefined ? C.warningLight : "transparent", color: C.warning }}
                            title="דיווח כמות חלקית">
                            {partialQty[item.productId] !== undefined ? `⚠️ ${partialQty[item.productId]}` : "⚠️"}
                          </button>
                        )}
                      </div>
                    )}
                    {deptDone && <span style={{ color: C.success }}>✅</span>}
                  </div>

                  {/* הערת פריט – חוסמת בהכנה, צריך לאשר */}
                  {item.note?.trim() && (
                    <div style={{ background: itemNoteConf[item.productId] ? C.successLight : "#FFF3CD", border: `1px solid ${itemNoteConf[item.productId] ? C.success+"66" : "#FFC107"}`, borderTop: "none", borderRadius: "0 0 8px 8px", padding: "6px 12px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8 }}>
                        <div style={{ flex: 1 }}>
                          <span style={{ fontSize: 11, fontWeight: 700, color: "#92400E" }}>📌 </span>
                          <span style={{ fontSize: 13 }}>{item.note}</span>
                        </div>
                        {itemNoteConf[item.productId]
                          ? <span style={{ color: C.success, fontWeight: 700, fontSize: 12, flexShrink: 0 }}>✅</span>
                          : <button onClick={() => confItemNote(item.productId)} style={{ background: "#FFC107", border: "none", borderRadius: 6, color: "#fff", padding: "4px 10px", fontWeight: 700, cursor: "pointer", fontFamily: "Heebo, sans-serif", fontSize: 11, flexShrink: 0 }}>✓ אשר</button>}
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

            {/* OTHER ITEMS – display only, very dimmed */}
            {otherItems.length > 0 && (
              <div style={{ borderTop: `1px dashed ${C.border}`, paddingTop: 5, marginTop: 4 }}>
                <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 3 }}>{t("שאר הפריטים","अन्य")}</div>
                {otherItems.map(item => (
                  <div key={item.productId} style={{ display: "flex", justifyContent: "space-between", padding: "2px 4px", fontSize: 12, opacity: 0.3, color: C.textMuted }}>
                    <span>{item._name}</span><span>{item.qty}</span>
                  </div>
                ))}
              </div>
            )}

            {/* כפתור סיום מחלקה */}
            {!deptDone && allMyDone && (
              <div style={{ marginTop: 12 }}>
                {requiresGenNote && order.note?.trim() && !genNoteConf && (
                  <div style={{ background: C.warningLight, borderRadius: 6, padding: "5px 10px", marginBottom: 8, fontSize: 12, color: C.warning, fontWeight: 600 }}>
                    ⚠️ {t("יש לאשר הערה כללית לפני סיום","समाप्त करने से पहले नोट की पुष्टि करें")}
                  </div>
                )}
                <button onClick={() => canFinish && setShowFinish(true)}
                  style={{ width: "100%", padding: "12px 0", border: "none", borderRadius: 10, background: canFinish ? C.success : "#bbb", color: "#fff", fontWeight: 800, fontSize: 15, cursor: canFinish ? "pointer" : "not-allowed", fontFamily: "Heebo, sans-serif", boxShadow: canFinish ? "0 4px 12px rgba(39,174,96,0.25)" : "none" }}>
                  ✅ {t(`סיימתי – מחלקת ${dept}`, `${DEPT_HI[dept]} पूर्ण`)}
                </button>
              </div>
            )}

            {deptDone && (
              <div style={{ marginTop: 8, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ color: C.success, fontWeight: 700, fontSize: 13 }}>✅ {dept} סיימה</span>
                <button onClick={() => { const updated = ctx.orders.map(o => o.id===order.id ? {...o, deptStatus: {...o.deptStatus, [dept]:"in_progress"}} : o); ctx.saveOrders(updated); }}
                  style={{ background: "none", border: `1px solid ${C.border}`, borderRadius: 6, padding: "3px 10px", fontSize: 12, cursor: "pointer", color: C.textMuted, fontFamily: "Heebo, sans-serif" }}>↩ תקן</button>
              </div>
            )}
          </>
        )}
      </div>

      {/* Partial qty modal */}
      {showPartial && (() => {
        const item = myItems.find(i => i.productId === showPartial);
        if (!item) return null;
        const current = partialQty[showPartial] ?? item.qty;
        return (
          <Modal title={`⚠️ חוסר – ${item._name}`} onClose={() => setShowPartial(null)} width={320}>
            <p style={{ fontSize: 14, color: C.textMuted, marginBottom: 16 }}>
              הוזמן: <strong>{item.qty} יח׳</strong>. כמה הכנת בפועל?
            </p>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 16 }}>
              <button onClick={() => setPartialQty(p => ({...p, [showPartial]: Math.max(0, (p[showPartial]??item.qty)-1)}))}
                style={{ width: 44, height: 44, borderRadius: 10, border: `1.5px solid ${C.border}`, background: C.surface, fontSize: 22, cursor: "pointer" }}>−</button>
              <input type="number" value={partialQty[showPartial]??item.qty}
                onChange={e => setPartialQty(p => ({...p, [showPartial]: Math.max(0, Math.min(item.qty, parseInt(e.target.value)||0))}))}
                style={{ flex: 1, textAlign: "center", fontSize: 24, fontWeight: 800, border: `2px solid ${C.warning}`, borderRadius: 10, padding: "8px 0", fontFamily: "Heebo, sans-serif" }} />
              <button onClick={() => setPartialQty(p => ({...p, [showPartial]: Math.min(item.qty, (p[showPartial]??item.qty)+1)}))}
                style={{ width: 44, height: 44, borderRadius: 10, border: `1.5px solid ${C.border}`, background: C.surface, fontSize: 22, cursor: "pointer" }}>+</button>
            </div>
            {(partialQty[showPartial]??item.qty) < item.qty && (
              <div style={{ background: C.warningLight, border: `1.5px solid ${C.warning}`, borderRadius: 8, padding: "8px 12px", marginBottom: 14, fontSize: 13, color: "#92400E" }}>
                ⚠️ חוסר של <strong>{item.qty - (partialQty[showPartial]??item.qty)} יח׳</strong> – יועבר כהתראה למוניטור
              </div>
            )}
            <div style={{ display: "flex", gap: 10 }}>
              <Btn variant="ghost" onClick={() => { setPartialQty(p => { const n={...p}; delete n[showPartial]; return n; }); setShowPartial(null); }} style={{ flex: 1 }}>ביטול</Btn>
              <Btn onClick={() => setShowPartial(null)} style={{ flex: 1 }}>✓ אישור</Btn>
            </div>
          </Modal>
        );
      })()}

      {showFinish && (
        <Modal title={t("אישור סיום","समाप्ति")} onClose={() => setShowFinish(false)} width={300}>
          <p style={{ fontSize: 15, marginBottom: 20 }}>{t(`לאשר שמחלקת ${dept} סיימה – ${order.customerName}?`, `${DEPT_HI[dept]} पूर्ण?`)}</p>
          <div style={{ display: "flex", gap: 10 }}>
            <Btn variant="ghost" onClick={() => setShowFinish(false)} style={{ flex: 1 }}>{t("ביטול","रद्द")}</Btn>
            <Btn onClick={handleFinish} style={{ flex: 1, background: C.success }}>{t("✅ אישור","✅ पुष्टि")}</Btn>
          </div>
        </Modal>
      )}
    </Card>
  );
}

// ─── MANAGER SCREEN ─────────────────────────────────────────────────────────────
function ManagerScreen({ ctx }) {
  const [tab, setTab] = useState("dashboard"); // dashboard | products | categories | customers | orders

  const todayStr = today();
  const todayOrders = ctx.orders.filter(o => o.deliveryDate === todayStr);
  const pendingOrders = ctx.orders.filter(o => o.status === "pending");
  const readyOrders = ctx.orders.filter(o => o.status === "ready");

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      {/* Header */}
      <div style={{ background: "#222222", padding: "16px 20px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <h2 style={{ color: "#fff", fontSize: 18, fontWeight: 800 }}>ניהול מערכת</h2>
            <p style={{ color: "#ffffff88", fontSize: 13 }}>שלום, {ctx.user?.name}</p>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn size="sm" variant="ghost" onClick={() => ctx.setScreen("monitor")} style={{ color: "#fff", borderColor: "#ffffff44" }}>מוניטור</Btn>
            <button onClick={() => { ctx.setUser(null); ctx.setNewOrderMode(true); ctx.setScreen("login"); }}
              style={{ background: C.accent, border: "none", borderRadius: 10, padding: "8px 16px", color: "#fff", fontWeight: 800, fontSize: 14, cursor: "pointer", fontFamily: "Heebo, sans-serif", display: "flex", alignItems: "center", gap: 6, boxShadow: "0 2px 8px rgba(200,135,58,0.4)" }}>
              ➕ הזמנה חדשה
            </button>
            <Btn size="sm" variant="ghost" onClick={() => ctx.setScreen("login")} style={{ color: "#fff", borderColor: "#ffffff44" }}>יציאה</Btn>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", background: C.surface, borderBottom: `1px solid ${C.border}`, overflowX: "auto" }}>
        {[["dashboard","📊 דשבורד"],["orders","📋 הזמנות"],["products","🥖 מוצרים"],["categories","🗂️ קטגוריות"],["customers","👥 לקוחות"]].map(([v,l]) => (
          <button key={v} onClick={() => setTab(v)} style={{
            flex: "none", padding: "12px 16px", border: "none", background: "none",
            fontWeight: 600, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap",
            color: tab === v ? C.primary : C.textMuted,
            borderBottom: tab === v ? `3px solid ${C.primary}` : "3px solid transparent"
          }}>{l}</button>
        ))}
      </div>

      <div style={{ padding: 20 }}>
        {tab === "dashboard" && (
          <div>
            {/* KPIs */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 24 }}>
              {[
                { label: "הזמנות היום", val: todayOrders.length, color: C.primary, icon: "📅" },
                { label: "ממתינות", val: pendingOrders.length, color: C.warning, icon: "⏳" },
                { label: "מוכנות", val: readyOrders.length, color: C.success, icon: "✅" },
              ].map(k => (
                <Card key={k.label} style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 24 }}>{k.icon}</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: k.color }}>{k.val}</div>
                  <div style={{ fontSize: 12, color: C.textMuted }}>{k.label}</div>
                </Card>
              ))}
            </div>

            {/* Quick links */}
            {/* Dev: clear storage */}
            <button onClick={async () => {
              if (!window.confirm("למחוק את כל ההזמנות?")) return;
              await window.storage.set("eden-orders-v1", JSON.stringify([]), true);
              ctx.saveOrders([]);
              ctx.showToast("הזמנות נמחקו");
            }} style={{ background: C.dangerLight, border: `1px solid ${C.danger}`, borderRadius: 8, padding: "6px 14px", cursor: "pointer", fontSize: 12, color: C.danger, fontFamily: "Heebo, sans-serif", marginBottom: 14 }}>
              🗑️ נקה הזמנות (לצורך בדיקה)
            </button>

            <h3 style={{ fontSize: 15, fontWeight: 700, marginBottom: 12 }}>גישה מהירה</h3>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {[
                { label: "מוניטור הזמנות", icon: "📡", screen: "monitor", dept: null },
                { label: "הזמנה חדשה", icon: "➕", screen: "order", dept: null },
                ...DEPARTMENTS.map(d => ({ label: `מחלקת ${d}`, icon: DEPT_ICONS[d], screen: "dept", dept: d })),
              ].map(q => (
                <button key={q.label} onClick={() => { if (q.dept) ctx.setInitialDept(q.dept); ctx.setScreen(q.screen); }} style={{
                  background: q.dept ? (C.dept[q.dept]+"15"||C.surface) : C.surface,
                  border: `1px solid ${q.dept ? (C.dept[q.dept]+"44"||C.border) : C.border}`,
                  borderRadius: 12, padding: 14, cursor: "pointer", textAlign: "center"
                }}>
                  <div style={{ fontSize: 26, marginBottom: 4 }}>{q.icon}</div>
                  <div style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{q.label}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {tab === "orders" && <OrdersManagement ctx={ctx} />}
        {tab === "products" && <ProductsManagement ctx={ctx} />}
        {tab === "categories" && <CategoriesManagement ctx={ctx} />}
        {tab === "customers" && <CustomersManagement ctx={ctx} />}
      </div>
    </div>
  );
}

// ─── ORDERS MANAGEMENT ──────────────────────────────────────────────────────────
function OrdersManagement({ ctx }) {
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <h3 style={{ fontSize: 16, fontWeight: 700 }}>כל ההזמנות ({ctx.orders.length})</h3>
        <Btn size="sm" onClick={() => { ctx.setUser(null); ctx.setNewOrderMode(true); ctx.setScreen("login"); }}>+ הזמנה חדשה</Btn>
